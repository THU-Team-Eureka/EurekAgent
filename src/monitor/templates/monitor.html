// ========== Conversation rendering ==========

function groupEventsByTurn(events) {
  const turns = [];
  let current = null;

  for (const event of events) {
    const ts = event.timestamp || null;
    if (event.role === 'user') {
      if (current) turns.push(current);
      current = { role: 'user', items: event.content_items, event, timestamp: ts };
    } else if (event.role === 'assistant') {
      if (current) turns.push(current);
      current = { role: 'assistant', items: event.content_items, toolResults: [], event, timestamp: ts };
    } else if (event.role === 'tool_result') {
      if (current && current.role === 'assistant') {
        current.toolResults.push(...event.content_items);
      } else {
        // Orphan tool_result without preceding assistant — create a synthetic turn
        if (current) turns.push(current);
        current = { role: 'assistant', items: [], toolResults: event.content_items, event, timestamp: ts };
      }
    }
  }
  if (current) turns.push(current);
  return turns;
}

function renderActivityStrip(turns) {
  if (!turns || turns.length === 0) return '';
  let html = '<div class="activity-strip">';
  let first = true;

  for (let i = 0; i < turns.length; i++) {
    const turn = turns[i];
    if (!first) html += '<span class="activity-arrow">\u2192</span>';
    first = false;

    if (turn.role === 'user') {
      html += `<span class="activity-chip" onclick="scrollToTurn(${i})">prompt</span>`;
    } else {
      const textItems = turn.items.filter(it => it.type === 'text');
      const toolUseItems = turn.items.filter(it => it.type === 'tool_use');
      const totalTools = toolUseItems.length + turn.toolResults.length;

      if (textItems.length > 0 && totalTools === 0) {
        html += `<span class="activity-chip" onclick="scrollToTurn(${i})">reply</span>`;
      } else if (totalTools > 0) {
        // Group tool names by count
        const toolCounts = {};
        for (const it of toolUseItems) {
          const name = _shortToolName(it.tool_name || '?');
          toolCounts[name] = (toolCounts[name] || 0) + 1;
        }
        for (const it of turn.toolResults) {
          const name = _shortToolName(it.tool_name || '?');
          toolCounts[name] = (toolCounts[name] || 0) + 1;
        }
        const chips = Object.entries(toolCounts)
          .map(([name, count]) => count > 1 ? `${name} \u00d7${count}` : name)
          .join(' ');
        html += `<span class="activity-chip" onclick="scrollToTurn(${i})">${esc(chips)}</span>`;
      }
    }
  }
  html += '</div>';
  return html;
}

function _shortToolName(name) {
  if (name.includes('web_search')) return 'Search';
  if (name === 'Skill') return 'Skill';
  if (name === 'Agent') return 'Agent';
  if (name === 'Read') return 'Read';
  if (name === 'Write') return 'Write';
  if (name === 'Edit') return 'Edit';
  if (name === 'Glob') return 'Glob';
  if (name === 'Grep') return 'Grep';
  if (name === 'Bash') return 'Bash';
  if (name === 'TaskCreate') return 'TaskCreate';
  if (name === 'TaskUpdate') return 'TaskUpdate';
  if (name.startsWith('mcp__')) return name.split('__').pop().replace(/_/g, ' ');
  return name;
}

function scrollToTurn(index) {
  const el = document.getElementById('conv-turn-' + index);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function toggleUserText(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const isCollapsed = el.classList.contains('collapsed');
  if (isCollapsed) {
    el.classList.remove('collapsed');
    el.classList.add('expanded');
    btn.textContent = 'Show less';
  } else {
    el.classList.remove('expanded');
    el.classList.add('collapsed');
    btn.textContent = 'Show more';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function initCollapsibleUserTexts() {
  document.querySelectorAll('.conv-user .conv-text.collapsed').forEach(el => {
    const btn = el.parentElement.querySelector('.conv-expand-btn');
    if (!btn) return;
    if (el.scrollHeight <= 120) {
      el.classList.remove('collapsed');
      el.classList.add('expanded');
      btn.style.display = 'none';
    }
  });
}

function renderToolRow(item, isResult) {
  if (isResult) {
    return `<div class="conv-tool-row">
      <span class="conv-tool-badge">${esc(_shortToolName(item.tool_name || '?'))}</span>
      <details class="conv-tool-detail" open><summary style="font-size:11px;color:var(--text-muted)">Hide output</summary><div class="code-block" style="font-size:11px;max-height:200px;overflow-y:auto">${highlight(item.text || '', '')}</div></details>
    </div>`;
  }
  return `<div class="conv-tool-row">
    <span class="conv-tool-badge">${esc(_shortToolName(item.tool_name || '?'))}</span>
    <details class="conv-tool-detail" open><summary style="font-size:11px;color:var(--text-muted)">Hide input</summary><div class="code-block" style="font-size:11px">${highlight(item.tool_input || '', 'json')}</div></details>
  </div>`;
}

function _toolPreview(text, maxLen) {
  if (!text) return '';
  const firstLine = text.trim().split('\n')[0] || '';
  if (firstLine.length <= maxLen) return firstLine;
  return firstLine.substring(0, maxLen) + '...';
}

function _toolInputPreview(input, toolName) {
  if (!input) return '';
  try {
    const obj = JSON.parse(input);
    if (toolName === 'Read' && obj.file_path) return '\u2192 ' + obj.file_path.split('/').pop();
    if (toolName === 'Write' && obj.file_path) return '\u2192 ' + obj.file_path.split('/').pop();
    if (toolName === 'Glob' && obj.pattern) return '\u2192 ' + obj.pattern;
    if (toolName === 'Grep' && obj.pattern) return '\u2192 ' + obj.pattern;
    if (toolName === 'Bash' && obj.command) return '\u2192 ' + obj.command.substring(0, 60);
    if (toolName === 'Skill' && obj.skill) return '\u2192 ' + obj.skill;
    if (toolName === 'Agent' && obj.description) return '\u2192 ' + obj.description.substring(0, 60);
    if (input.includes('web_search') && obj.search_query) return '\u2192 ' + obj.search_query.substring(0, 60);
    for (const val of Object.values(obj)) {
      if (typeof val === 'string' && val.length > 0) return '\u2192 ' + val.substring(0, 60);
    }
  } catch(e) {}
  return _toolPreview(input, 60);
}

function renderConversation(conv, title, scrollId, key) {
  if (!conv || !conv.events.length) return '';

  const turns = groupEventsByTurn(conv.events);
  const totalTools = turns.reduce((sum, t) => sum + (t.role === 'assistant' ? t.items.filter(it => it.type === 'tool_use').length + t.toolResults.length : 0), 0);
  const msgCount = conv.events.length;
  const headerTitle = title || (conv.session_name ? 'Session: ' + esc(conv.session_name) : 'Session Log');
  const headerMeta = `${msgCount} message${msgCount !== 1 ? 's' : ''}${totalTools > 0 ? ', ' + totalTools + ' tool' + (totalTools !== 1 ? 's' : '') : ''}`;
  const scrollIdAttr = scrollId ? ` id="${scrollId}"` : '';
  // Keyed conversations opt into incremental refresh: the refresh timer reads
  // data-conv-key + data-rendered-turns off the scroll container and appends
  // only newly-arrived turns (see refreshOpenConversations).
  const convKeyAttr = key ? ` data-conv-key="${esc(key)}" data-rendered-turns="${turns.length}"` : '';
  const metaIdAttr = scrollId ? ` id="conv-meta-${scrollId}"` : '';
  if (key) _openConvConvs[key] = conv;  // shared in-memory conv; we append to its events

  let html = `<div class="rounded-xl overflow-hidden border" style="background:var(--header-bg); border-color:var(--border-subtle)">
    <div class="px-6 py-3 flex items-center justify-between" style="background:var(--sidebar-bg)">
      <div class="flex items-center gap-2">
        <div class="flex gap-1.5">
          <div class="w-3 h-3 rounded-full" style="background:var(--status-error-text);opacity:0.5"></div>
          <div class="w-3 h-3 rounded-full" style="background:var(--accent);opacity:0.5"></div>
          <div class="w-3 h-3 rounded-full" style="background:var(--accent-secondary);opacity:0.5"></div>
        </div>
        <span class="ml-4 font-mono text-xs uppercase" style="color:var(--accent-secondary); letter-spacing:0.1em">${headerTitle}</span>
        <span class="font-mono text-xs" style="color:var(--text-muted)"${metaIdAttr}>${esc(headerMeta)}</span>
      </div>
    </div>
    <div class="p-4" style="max-height:600px; overflow-y:auto"${scrollIdAttr}${convKeyAttr}>`;

  // Render turns
  for (let i = 0; i < turns.length; i++) {
    html += renderTurnHTML(turns[i], i);
  }

  html += '</div></div>';
  return html;
}

// Render a single conversation turn as HTML. Extracted from renderConversation
// so the incremental refresher can render just the new/changed turns without
// rebuilding the whole transcript DOM (which is what made large transcripts lag).
function renderTurnHTML(turn, i) {
  let html = `<div id="conv-turn-${i}">`;

  if (turn.role === 'user') {
    let content = '';
    let images = [];
    for (const item of turn.items) {
      if (item.type === 'text') content += md(item.text);
      else if (item.type === 'image') images.push(item);
    }
    content += renderImages(images);
    const cId = 'user-text-' + i;
    const tsLabel = turn.timestamp ? `<span class="font-mono text-[10px] ml-2" style="color:var(--text-muted);opacity:0.7">${formatISOTime(turn.timestamp)}</span>` : '';
    html += `<div class="conv-user">
      <div class="conv-role"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;margin-right:4px">person</span>User${tsLabel}</div>
      <div class="conv-text collapsed" id="${cId}">${content}</div>
      <span class="conv-expand-btn" onclick="toggleUserText('${cId}', this)">Show more</span>
    </div>`;
  } else {
    // Assistant turn
    const textItems = turn.items.filter(it => it.type === 'text');
    const thinkingItems = turn.items.filter(it => it.type === 'thinking');
    const toolUseItems = turn.items.filter(it => it.type === 'tool_use');
    const totalToolsInTurn = toolUseItems.length + turn.toolResults.length;
    const tsLabel = turn.timestamp ? `<span class="font-mono text-[10px] ml-2" style="color:var(--text-muted);opacity:0.7">${formatISOTime(turn.timestamp)}</span>` : '';

    html += `<div class="conv-assistant">
      <div class="conv-role"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;margin-right:4px">auto_awesome</span>Assistant${tsLabel}</div>`;

    // Text content (always visible)
    let textContent = '';
    for (const item of textItems) {
      textContent += md(item.text);
    }
    textContent += renderImages(turn.items.filter(it => it.type === 'image'));
    if (textContent) {
      html += `<div class="conv-text">${textContent}</div>`;
    }

    // Thinking chip
    if (thinkingItems.length > 0) {
      html += `<details><summary class="conv-chip conv-chip-thinking">Thinking...</summary>`;
      for (const item of thinkingItems) {
        html += `<div class="conv-thinking-content">${esc(item.text)}</div>`;
      }
      html += `</details>`;
    }

    // Tools chip
    if (totalToolsInTurn > 0) {
      html += `<details><summary class="conv-chip conv-chip-tools">${totalToolsInTurn} tool${totalToolsInTurn !== 1 ? 's' : ''} used</summary>`;
      html += `<div class="conv-tools-list">`;
      for (const item of toolUseItems) {
        html += renderToolRow(item, false);
      }
      for (const item of turn.toolResults) {
        html += renderToolRow(item, true);
      }
      html += `</div></details>`;
    }

    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderImages(images) {
  if (!images || images.length === 0) return '';
  let html = '<div class="conv-image-list">';
  images.forEach((image, idx) => {
    const src = image.url || '';
    if (!src) return;
    const title = image.title || `Image #${idx + 1}`;
    const media = image.media_type || '';
    const caption = media ? `${title} · ${media}` : title;
    html += `<figure class="conv-image-card"><img src="${escAttr(src)}" alt="${escAttr(title)}" loading="lazy"><figcaption class="conv-image-caption">${esc(caption)}</figcaption></figure>`;
  });
  html += '</div>';
  return html;
}

// ========== Approach rendering (detail view with tabs) ==========
function renderApproach(approach, loopIdx) {
  let html = `<div class="approach-card rounded-xl border overflow-hidden" style="background:var(--card-bg); border-color:var(--border-subtle)" id="approach-${approach.approach_id}">`;

  // Header
  html += `<div class="approach-header flex justify-between items-center cursor-pointer px-6 py-4" style="background:var(--card-bg-alt)" onclick="toggleApproach('${approach.approach_id}')">
    <div class="flex items-center gap-3">
      <span class="px-2 py-1 rounded font-mono text-[10px]" style="background:var(--main-bg); color:var(--accent-secondary); border:1px solid var(--border-subtle)">${esc(approach.approach_id)}</span>
      ${approach.name && approach.name !== approach.approach_id ? `<h4 class="font-headline font-bold" style="color:var(--text-heading)">${esc(approach.name)}</h4>` : ''}
    </div>
    <div class="flex items-center gap-4">
      ${approach.score !== null && approach.score !== undefined ? `<span class="font-mono font-bold" style="color:var(--accent)">${fmtScore(approach.score)}</span>` : ''}
      <span class="material-symbols-outlined text-sm" style="color:var(--text-muted)">expand_more</span>
    </div>
  </div>`;

  // Body (collapsible)
  html += `<div class="approach-card-body">`;
  html += `<div class="p-6">`;

  // Scored solution description and initial hypothesis are separate.
  const solutionDesc = (approach.final_result && approach.final_result.description) || approach.solution_description || approach.description || '';
  if (solutionDesc) {
    html += `<div class="mb-4">
      <div class="text-[10px] uppercase tracking-widest mb-1" style="color:var(--accent-secondary)">Current best solution description</div>
      <p style="color:var(--text-heading)">${esc(solutionDesc)}</p>
    </div>`;
  }
  if (approach.initial_hypothesis_description) {
    html += `<details class="mb-4"><summary>Initial approach description</summary>
      <p style="color:var(--text-muted);font-size:0.85rem">${esc(approach.initial_hypothesis_description)}</p>
    </details>`;
  }

  // Tab bar
  const tabs = [];
  if (approach.approach_md) tabs.push('initial');
  const hasConversations = (approach.subagent_conversations && approach.subagent_conversations.length) ||
                           approach.has_subagent_conversations;
  if (hasConversations) tabs.push('session');
  if (approach.has_code_files || (approach.code_files && Object.keys(approach.code_files).length)) tabs.push('code');
  if (approach.has_experiment_log || approach.experiment_log) tabs.push('log');

  if (tabs.length) {
    html += '<div class="tab-bar">';
    for (let i = 0; i < tabs.length; i++) {
      const tabLabel = tabs[i] === 'initial' ? 'initial hypothesis' : tabs[i];
      html += `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(this,'${approach.approach_id}','${tabs[i]}')">${tabLabel}</button>`;
    }
    html += '</div>';

    for (let i = 0; i < tabs.length; i++) {
      const tab = tabs[i];
      html += `<div class="tab-content${i===0?' active':''}" id="tab-${approach.approach_id}-${tab}">`;
      if (tab === 'initial') html += md(approach.approach_md);
      else if (tab === 'session') {
        if (approach.subagent_conversations && approach.subagent_conversations.length) {
          for (let si = 0; si < approach.subagent_conversations.length; si++) {
            const sub = approach.subagent_conversations[si];
            html += renderConversation(sub, 'Session: ' + esc(sub.session_name), `conv-scroll-${approach.approach_id}-${si}`);
          }
        } else {
          html += `<div id="conv-loading-${approach.approach_id}" style="color:var(--text-muted)">Loading session data...</div>`;
          loadConversation(approach.approach_id).then(conv => {
            const el = document.getElementById('conv-loading-' + approach.approach_id);
            if (el && conv) { el.outerHTML = renderConversation(conv, 'Session: ' + esc(conv.session_name), `conv-scroll-${approach.approach_id}-0`, approach.approach_id); _restoreScrollPos(`conv-scroll-${approach.approach_id}-0`); }
            else if (el) el.textContent = 'No session data available.';
          });
        }
      }
      else if (tab === 'code') {
        if (approach.code_files && Object.keys(approach.code_files).length) {
          for (const [fname, content] of Object.entries(approach.code_files)) {
            html += `<details style="margin:0.3rem 0"><summary style="font-size:0.72rem;color:var(--text-muted)">${esc(fname)}</summary>`;
            html += `<pre style="font-size:0.72rem;color:var(--text-muted);white-space:pre-wrap;word-break:break-all">${esc(content)}</pre></details>`;
          }
        } else {
          html += `<div id="code-loading-${approach.approach_id}" style="color:var(--text-muted)">Loading code...</div>`;
          loadApproachDetail(approach.approach_id).then(detail => {
            const el = document.getElementById('code-loading-' + approach.approach_id);
            if (el && detail && detail.code_files) {
              let codeHtml = '';
              for (const [fname, content] of Object.entries(detail.code_files)) {
                codeHtml += `<details style="margin:0.3rem 0"><summary style="font-size:0.72rem;color:var(--text-muted)">${esc(fname)}</summary>`;
                codeHtml += `<pre style="font-size:0.72rem;color:var(--text-muted);white-space:pre-wrap;word-break:break-all">${esc(content)}</pre></details>`;
              }
              el.outerHTML = codeHtml || 'No code files.';
            } else if (el) el.textContent = 'No code files.';
          });
        }
      }
      else if (tab === 'log') {
        if (approach.experiment_log) {
          html += `<div style="font-size:0.72rem;color:var(--text-muted)">${md(approach.experiment_log)}</div>`;
        } else {
          html += `<div id="log-loading-${approach.approach_id}" style="color:var(--text-muted)">Loading log...</div>`;
          loadApproachDetail(approach.approach_id).then(detail => {
            const el = document.getElementById('log-loading-' + approach.approach_id);
            if (el && detail && detail.experiment_log) {
              el.outerHTML = `<div style="font-size:0.72rem;color:var(--text-muted)">${md(detail.experiment_log)}</div>`;
            } else if (el) el.textContent = 'No experiment log.';
          });
        }
      }
      html += '</div>';
    }
  }

  html += '</div></div></div>';
  return html;
}

// ========== Approach Card (overview compact view) ==========
function renderApproachCard(approach, loopIdx) {
  const statusConfig = {
    completed: { color: 'var(--green)', label: 'Completed', icon: 'check_circle', fill: true },
    evaluated: { color: 'var(--accent)', label: 'Evaluated', icon: 'check_circle', fill: false, pulse: true },
    running: { color: 'var(--accent)', label: 'In Progress', icon: 'sync', pulse: true },
    pending: { color: 'var(--text-muted)', label: 'Running', icon: 'hourglass_empty' },
    failed: { color: 'var(--red)', label: 'Failed', icon: 'error' },
  };
  const sc = statusConfig[approach.status] || statusConfig.pending;
  const isRing = approach.status === 'running';

  let html = `<div class="group rounded-xl p-6 border flex flex-col justify-between h-48 relative overflow-hidden cursor-pointer transition-all duration-300 ${isRing ? 'ring-1' : ''}" style="background:var(--card-bg); border-color:var(--border-subtle); ${isRing ? 'ring-color:var(--accent-glow)' : ''}" onclick="navigateToApproach('${approach.approach_id}', ${loopIdx})">`;
  html += `<div class="absolute top-0 right-0 w-24 h-24 rounded-full -mr-8 -mt-8" style="background:var(--accent);opacity:${approach.status==='running'?0.1:0.05}; filter:blur(3rem)"></div>`;

  html += '<div>';
  html += `<div class="flex justify-between items-start mb-4">
    <span class="px-2 py-1 rounded font-mono text-[10px]" style="background:var(--main-bg); color:${approach.status==='running'?'var(--accent)':'var(--accent-secondary)'}; border:1px solid ${approach.status==='running'?'var(--accent-glow)':'var(--border-subtle)'}">${esc(approach.approach_id)}</span>
    <span class="flex items-center gap-1.5 text-[10px] font-bold" style="color:${sc.color}">
      ${sc.pulse ? '<span class="w-1.5 h-1.5 rounded-full animate-pulse" style="background:' + sc.color + '"></span>' : ''}
      ${sc.label}
    </span>
  </div>`;
  html += `<h4 class="font-headline font-bold text-lg leading-tight group-hover:text-primary transition-colors" style="color:var(--text-heading)">${esc(approach.name || approach.approach_id)}</h4>`;
  html += '</div>';

  html += '<div class="flex justify-end items-end">';
  html += `<div class="space-y-1 text-right">
    <div class="text-[10px] uppercase tracking-widest" style="color:var(--accent-secondary)">Score</div>
    <div class="text-sm font-mono" style="color:var(--text-heading)">${approach.score != null ? fmtScore(approach.score) : 'N/A'}</div>
  </div>`;
  html += '</div>';

  html += '</div>';
  return html;
}

// ========== Approach toggle ==========
function toggleApproach(approachId) {
  const card = document.getElementById('approach-' + approachId);
  if (!card) return;

  // If expanding and detail not loaded yet, fetch it
  if (!card.classList.contains('expanded') && !_approachDetailCache[approachId]) {
    card.classList.add('expanded');
    const body = card.querySelector('.approach-card-body');
    if (body) body.innerHTML = '<div class="p-6 text-center" style="color:var(--text-muted)">Loading...</div>';
    loadApproachDetail(approachId).then(detail => {
      if (detail && RUN && RUN.loops) {
        // Merge detail into the approach in RUN data
        for (const loop of RUN.loops) {
          if (loop.approaches) {
            const idx = loop.approaches.findIndex(a => a.approach_id === approachId);
            if (idx >= 0) {
              Object.assign(loop.approaches[idx], detail);
              break;
            }
          }
        }
        // Re-render just this card
        const loopIdx = _findLoopForApproach(approachId);
        if (loopIdx !== null) {
          const approach = _getApproach(approachId);
          if (approach) {
            card.outerHTML = renderApproach(approach, loopIdx);
            const newCard = document.getElementById('approach-' + approachId);
            if (newCard) newCard.classList.add('expanded');
          }
        }
      }
    });
  } else {
    card.classList.toggle('expanded');
  }
}

function _findLoopForApproach(approachId) {
  if (!RUN || !RUN.loops) return null;
  for (const loop of RUN.loops) {
    if (loop.approaches) {
      const found = loop.approaches.find(a => a.approach_id === approachId);
      if (found) return loop.loop_index;
    }
  }
  return null;
}

function _getApproach(approachId) {
  if (!RUN || !RUN.loops) return null;
  for (const loop of RUN.loops) {
    if (loop.approaches) {
      const found = loop.approaches.find(a => a.approach_id === approachId);
      if (found) return found;
    }
  }
  return null;
}

function navigateToApproach(approachId, loopIdx) {
  showSection('loop-' + loopIdx + '-implement');
  // After rendering, expand the target approach card
  setTimeout(() => {
    const card = document.getElementById('approach-' + approachId);
    if (card) {
      card.classList.add('expanded');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 50);
}

function switchTab(btn, approachId, tabName) {
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const allTabs = btn.parentElement.parentElement.querySelectorAll('.tab-content');
  allTabs.forEach(t => t.classList.remove('active'));
  const target = document.getElementById(`tab-${approachId}-${tabName}`);
  if (target) target.classList.add('active');
}

// ========== Data loading ==========
let _lastRunJson = '';
let _lastStructureKey = '';  // tracks structural changes (new loops/approaches)
const _approachDetailCache = {};
const _conversationCache = {};
let _pollInterval = 1000;
let _pollTimer = null;
// Incremental conversation refresh. Keyed conversations register their
// in-memory conv here; a timer appends only new turns to whichever
// conversation is currently visible (see refreshOpenConversations).
let _openConvConvs = {};
let _convPollTimer = null;
const _CONV_POLL_INTERVAL = 1000;

function _structureKey(run) {
  // A lightweight fingerprint of the run structure — changes only when
  // loops or approaches are added/removed or scores change.
  if (!run || !run.loops) return '';
  return run.loops.map(l =>
    l.loop_index + ':' + (l.approaches || []).map(a =>
      a.approach_id + '=' + a.status + ':' + a.score
    ).join(',')
  ).join('|');
}

async function fetchRunData() {
  try {
    const [runResp, logResp] = await Promise.all([
      fetch('/api/run-overview'),
      fetch('/api/execution-log'),
    ]);
    if (!runResp.ok) return;
    const data = await runResp.json();
    if (logResp.ok) {
      const logData = await logResp.json();
      TIMELINE = logData.timeline || [];
    }
    const newRunJson = JSON.stringify(data.run_data);
    if (newRunJson !== _lastRunJson) {
      _lastRunJson = newRunJson;
      // Merge new overview data into RUN while preserving already-loaded details
      const newRun = data.run_data;
      if (RUN && RUN.loops) {
        for (const newLoop of (newRun.loops || [])) {
          const oldLoop = RUN.loops.find(l => l.loop_index === newLoop.loop_index);
          if (oldLoop && oldLoop.approaches) {
            for (const newApp of (newLoop.approaches || [])) {
              const oldApp = oldLoop.approaches.find(a => a.approach_id === newApp.approach_id);
              if (oldApp && oldApp.code_files) {
                // Preserve full-detail fields that overview doesn't include
                newApp.code_files = oldApp.code_files;
                newApp.experiment_log = oldApp.experiment_log;
                newApp.subagent_conversations = oldApp.subagent_conversations;
              }
            }
          }
          // Preserve loaded conversations
          const oldLoop2 = RUN.loops.find(l => l.loop_index === newLoop.loop_index);
          if (oldLoop2 && oldLoop2.propose_conversation) {
            newLoop.propose_conversation = oldLoop2.propose_conversation;
          }
          if (oldLoop2 && oldLoop2.prepare_conversation) {
            newLoop.prepare_conversation = oldLoop2.prepare_conversation;
          }
        }
      }
      RUN = newRun;
      CHART = data.score_chart;
      window._globalBest = data.global_best;
      window._globalWorst = data.global_worst;
      // Only rebuild DOM when structure changes (new loops/approaches/scores).
      // Minor changes (e.g. token counts) just update header + timeline.
      const newKey = _structureKey(RUN);
      if (newKey !== _lastStructureKey) {
        _lastStructureKey = newKey;
        renderAll();
      } else {
        buildSidebar();
        buildHeader();
        const logEl = document.getElementById('exec-log-content');
        if (logEl) { logEl.innerHTML = buildExecutionLog(); logEl.scrollTop = logEl.scrollHeight; }
        // Still update evo chart if we're on overview
        if (currentSection === 'overview' && CHART) {
          initResultsCharts();
        }
      }
    } else {
      // Still update uptime + execution log (timeline may grow without run-data changing)
      buildHeader();
      const logEl = document.getElementById('exec-log-content');
      if (logEl) { logEl.innerHTML = buildExecutionLog(); logEl.scrollTop = logEl.scrollHeight; }
    }
    // Reduce polling when run is finished
    if (RUN && RUN.summary && RUN.summary.final_status &&
        RUN.summary.final_status !== 'running' && _pollInterval < 10000) {
      clearInterval(_pollTimer);
      _pollInterval = 10000;
      _pollTimer = setInterval(fetchRunData, _pollInterval);
    }
  } catch (e) {
    console.warn('Failed to fetch run data:', e);
  }
}

async function loadApproachDetail(approachId) {
  if (_approachDetailCache[approachId]) return _approachDetailCache[approachId];
  if (_isSnapshot) return null;
  try {
    const resp = await fetch('/api/approach-detail/' + encodeURIComponent(approachId));
    if (!resp.ok) return null;
    const data = await resp.json();
    if (data.approach) {
      _approachDetailCache[approachId] = data.approach;
      return data.approach;
    }
  } catch (e) {
    console.warn('Failed to load approach detail:', approachId, e);
  }
  return null;
}

async function loadConversation(conversationKey) {
  if (_conversationCache[conversationKey]) return _conversationCache[conversationKey];
  if (_isSnapshot) return null;
  try {
    const resp = await fetch('/api/conversation/' + encodeURIComponent(conversationKey));
    if (!resp.ok) return null;
    const data = await resp.json();
    const conv = data.conversation || null;
    if (conv) _conversationCache[conversationKey] = conv;
    return conv;
  } catch (e) {
    console.warn('Failed to load conversation:', conversationKey, e);
  }
  return null;
}

// ========== Incremental conversation refresh ==========
// The overview poll deliberately preserves already-loaded conversations, so an
// open transcript would otherwise freeze until a full page reload. This slower
// timer fetches only the NEW tail of each VISIBLE keyed conversation via the
// ?since= cursor and appends just the new/changed turns — bounded cost
// regardless of transcript size (the original reason for the load-once cache).

function _isNearBottom(el, threshold = 80) {
  if (!el) return false;
  return el.scrollHeight - el.scrollTop - el.clientHeight < threshold;
}

// Inner HTML for one conversation = just the turns (the container element is
// already the <div class="p-4"> wrapper that renderConversation emits).
function renderConversationInner(conv) {
  const turns = groupEventsByTurn(conv.events);
  let html = '';
  for (let i = 0; i < turns.length; i++) html += renderTurnHTML(turns[i], i);
  return html;
}

// Re-render the last (possibly grown) turn in place + append any brand-new
// turns. Avoids rebuilding the whole transcript DOM.
function appendConversationTurns(container, conv) {
  const turns = groupEventsByTurn(conv.events);
  const prev = parseInt(container.dataset.renderedTurns || '0', 10);
  const nearBottom = _isNearBottom(container);

  // Turn at index prev-1 may have grown (an in-progress assistant turn gaining
  // tool_use / tool_result items). Replace just that node.
  const lastIdx = prev - 1;
  if (lastIdx >= 0 && lastIdx < turns.length) {
    const node = container.querySelector('#conv-turn-' + lastIdx);
    if (node) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderTurnHTML(turns[lastIdx], lastIdx);
      if (tmp.firstElementChild) node.replaceWith(tmp.firstElementChild);
    }
  }
  // Append any turns beyond what was previously rendered.
  const start = Math.max(lastIdx + 1, 0);
  if (start < turns.length) {
    let html = '';
    for (let i = start; i < turns.length; i++) html += renderTurnHTML(turns[i], i);
    container.insertAdjacentHTML('beforeend', html);
  }
  container.dataset.renderedTurns = String(turns.length);

  // Refresh the "N messages, M tools" header meta.
  const metaEl = document.getElementById('conv-meta-' + container.id);
  if (metaEl) {
    const msgCount = conv.events.length;
    const totalTools = turns.reduce(
      (s, t) => s + (t.role === 'assistant'
        ? t.items.filter(it => it.type === 'tool_use').length + t.toolResults.length
        : 0), 0);
    metaEl.textContent = `${msgCount} message${msgCount !== 1 ? 's' : ''}` +
      `${totalTools > 0 ? ', ' + totalTools + ' tool' + (totalTools !== 1 ? 's' : '') : ''}`;
  }

  // Only auto-scroll if the user was already following the tail.
  if (nearBottom) container.scrollTop = container.scrollHeight;
}

async function refreshOpenConversations() {
  if (_isSnapshot) return;
  // Stop once the run is finished — no further messages will arrive.
  if (RUN && RUN.summary && RUN.summary.final_status &&
      RUN.summary.final_status !== 'running') return;

  const containers = document.querySelectorAll('[data-conv-key]');
  for (const container of containers) {
    if (container.offsetParent === null) continue;  // hidden tab / section
    const key = container.dataset.convKey;
    const conv = _openConvConvs[key];
    if (!conv || !conv.events) continue;

    let fresh;
    try {
      const resp = await fetch(
        '/api/conversation/' + encodeURIComponent(key) + '?since=' + conv.events.length);
      if (!resp.ok) continue;
      fresh = (await resp.json()).conversation;
    } catch (e) { continue; }
    if (!fresh) continue;

    // File shrank below our cursor (e.g. resume truncated it) → refetch full.
    if (fresh.reset) {
      delete _conversationCache[key];
      try {
        const fullResp = await fetch('/api/conversation/' + encodeURIComponent(key));
        if (fullResp.ok) {
          const fullConv = (await fullResp.json()).conversation;
          if (fullConv) {
            _openConvConvs[key] = fullConv;
            container.innerHTML = renderConversationInner(fullConv);
            container.dataset.renderedTurns = String(groupEventsByTurn(fullConv.events).length);
          }
        }
      } catch (e) { /* keep stale; next tick retries */ }
      continue;
    }

    const newEvents = fresh.events || [];
    if (!newEvents.length) continue;  // up to date
    // Append to the shared in-memory conv so full re-renders stay consistent,
    // then surgically update the DOM.
    conv.events.push(...newEvents);
    appendConversationTurns(container, conv);
  }
}

function scrollLogToBottom() {
  const logEl = document.getElementById('exec-log-content');
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

// ========== UI state preservation across re-renders ==========
let _expandedApproaches = new Set();
let _activeTabs = {};          // approach_id -> tab name
let _savedScrollTop = 0;
let _scrollPositions = {};     // element id -> scrollTop

function saveUIState() {
  _expandedApproaches = new Set();
  document.querySelectorAll('.approach-card.expanded').forEach(card => {
    const id = card.id.replace('approach-', '');
    _expandedApproaches.add(id);
  });
  // Save active tabs
  _activeTabs = {};
  document.querySelectorAll('.tab-btn.active').forEach(btn => {
    const tabContent = btn.closest('.approach-card');
    if (tabContent) {
      const approachId = tabContent.id.replace('approach-', '');
      _activeTabs[approachId] = btn.textContent;
    }
  });
  // Save scroll positions
  _savedScrollTop = window.scrollY;
  _scrollPositions = {};
  document.querySelectorAll('[id]').forEach(el => {
    if (el.scrollTop > 0) _scrollPositions[el.id] = el.scrollTop;
  });
}

function _restoreScrollPos(id) {
  if (_scrollPositions[id]) {
    const el = document.getElementById(id);
    if (el) requestAnimationFrame(() => { el.scrollTop = _scrollPositions[id]; });
  }
}

function restoreUIState() {
  // Restore expanded approaches
  _expandedApproaches.forEach(id => {
    const card = document.getElementById('approach-' + id);
    if (card) card.classList.add('expanded');
  });
  // Restore active tabs
  for (const [approachId, tabName] of Object.entries(_activeTabs)) {
    const card = document.getElementById('approach-' + approachId);
    if (card) {
      const btns = card.querySelectorAll('.tab-btn');
      btns.forEach(btn => {
        if (btn.textContent === tabName) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      // Show matching tab content
      card.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      const tabEl = document.getElementById('tab-' + approachId + '-' + tabName);
      if (tabEl) tabEl.classList.add('active');
    }
  }
  // Restore scroll positions after layout
  requestAnimationFrame(() => {
    for (const [id, scrollTop] of Object.entries(_scrollPositions)) {
      const el = document.getElementById(id);
      if (el) el.scrollTop = scrollTop;
    }
    if (_savedScrollTop > 0) window.scrollTo(0, _savedScrollTop);
  });
}

function renderAll() {
  if (!RUN) return;
  saveUIState();
  buildSidebar();
  buildHeader();
  if (currentSection) showSection(currentSection);
  else showSection('overview');
  restoreUIState();
  requestAnimationFrame(scrollLogToBottom);
}

// ========== SSE ==========
function connectSSE() {
  try {
    const es = new EventSource('/api/events');
    es.onmessage = function(e) {
      try {
        const event = JSON.parse(e.data);
        // Refresh on any meaningful event from the pipeline
        if (event.type === 'stage_change' || event.type === 'stage_complete' ||
            event.type === 'pipeline_start' || event.type === 'approach_scored' ||
            event.type === 'approaches_registered' || event.type === 'cost_warning' ||
            event.type === 'data_changed' || event.type === 'session_resuming') {
          fetchRunData();
        }
        if (event.type === 'run_ended' || event.type === 'pipeline_end') {
          if (RUN && RUN.summary) {
            let evStatus = (event.data && event.data.status) || event.status || 'unknown';
            // Normalize pipeline-specific statuses to canonical set
            if (['all_succeeded','partial_succeeded'].includes(evStatus)) evStatus = 'success';
            else if (evStatus === 'all_failed') evStatus = 'abort';
            else if (!['success','abort','interrupted','error','loop'].includes(evStatus)) evStatus = 'abort';
            RUN.summary.final_status = evStatus;
          }
          fetchRunData();
          renderAll();
        }
        // heartbeat — no action needed
      } catch(ex) {}
    };
    es.onerror = function() {
      es.close();
      // Fallback: switch to polling if SSE drops
      setInterval(fetchRunData, 2000);
    };
  } catch(e) {
    // SSE not available — fallback to polling
    setInterval(fetchRunData, 2000);
  }
}

// ========== Results Section ==========

// ── Data transform: RUN → EVO / RANKED / BASELINES ──

function buildEVO() {
  if (!RUN || !RUN.loops || !RUN.loops.length) return [];
  const evo = [];
  const chartByIter = {};
  if (CHART) for (const c of CHART) chartByIter[c.iter] = c;
  for (const loop of RUN.loops) {
    const chartEntry = chartByIter[loop.loop_index];
    const agents = (loop.approaches || []).map((a, i) => ({
      name: a.name || a.approach_id || 'unknown',
      score: a.score != null ? a.score : null,
      type: 'code',
      parent: null,
      _approach: a,
      is_best: chartEntry && chartEntry.agents[i] ? chartEntry.agents[i].is_best : false,
      is_worst: chartEntry && chartEntry.agents[i] ? chartEntry.agents[i].is_worst : false,
    }));
    const validScores = agents.map(a => a.score).filter(s => s !== null);
    if (!validScores.length) continue;
    const best = chartEntry ? chartEntry.best : validScores[0];
    const proposeSummary = loop.propose_result ? loop.propose_result.summary : '';
    evo.push({
      iter: loop.loop_index,
      agents,
      best,
      summary: proposeSummary || `Round ${loop.loop_index}: ${agents.length} approach(es) evaluated.`
    });
  }
  return evo;
}

// ── Results chart initialization & rendering ──

let _evoChart = null, _evoCtx = null;
let _evoCurrentStep = 0, _evoHoverStep = -1, _evoHoverDot = -1;
let _evoPinnedStep = -1, _evoPinnedDot = -1;
const _evoPAD = { top: 32, right: 16, bottom: 40, left: 72 };
let _evoDpr = 1;

function initResultsCharts() {
  const evo = buildEVO();

  if (!evo.length) return;

  // Only reset evo position if data actually changed
  const prevLen = (window._evoData || []).length;
  window._evoData = evo;
  if (evo.length !== prevLen) {
    _evoCurrentStep = Math.max(0, evo.length - 1);
    _evoHoverStep = -1; _evoHoverDot = -1;
  }

  const canvas = document.getElementById('evoChart');
  if (!canvas) return;
  _evoChart = canvas;
  _evoCtx = canvas.getContext('2d');

  initEvoCanvas();
  drawEvoChart();
  renderEvoCard();
  renderEvoLeaderboard();

  // Re-attach canvas events (canvas is re-created each time section is shown)
  canvas.removeEventListener('click', onEvoClick);
  canvas.removeEventListener('mousemove', onEvoMouseMove);
  canvas.removeEventListener('mouseleave', onEvoMouseLeave);
  canvas.addEventListener('click', onEvoClick);
  canvas.addEventListener('mousemove', onEvoMouseMove);
  canvas.addEventListener('mouseleave', onEvoMouseLeave);
}

// Chart logical dimensions — read from actual CSS size at init time
let _evoW = 900, _evoH = 320;

function initEvoCanvas() {
  if (!_evoChart) return;
  _evoDpr = window.devicePixelRatio || 1;
  // Let CSS control display size (width:100%, height:320px)
  // Read the actual rendered size for backing store + coordinate calculations
  const r = _evoChart.getBoundingClientRect();
  _evoW = r.width;
  _evoH = r.height;
  _evoChart.width = Math.round(_evoW * _evoDpr);
  _evoChart.height = Math.round(_evoH * _evoDpr);
  _evoCtx.setTransform(_evoDpr, 0, 0, _evoDpr, 0, 0);
}

function evoIterCenterX(i, w) {
  const evo = window._evoData;
  const n = w - _evoPAD.left - _evoPAD.right;
  return _evoPAD.left + (i + 0.5) * n / evo.length;
}

function evoAgentX(i, j, w) {
  const evo = window._evoData;
  const cx = evoIterCenterX(i, w);
  const count = evo[i].agents.length;
  if (count === 1) return cx;
  const colW = (w - _evoPAD.left - _evoPAD.right) / evo.length;
  const padding = 6;
  const availW = colW - padding * 2;
  const minGap = 20;
  const spread = Math.min(Math.max((count - 1) * minGap, availW * 0.65), availW);
  const step = count > 1 ? spread / (count - 1) : 0;
  return cx - spread / 2 + j * step;
}

function evoScoreY(s, h) {
  const evo = window._evoData;
  const scores = [];
  for (const it of evo) for (const a of it.agents) if (a.score !== null) scores.push(a.score);
  if (!scores.length) return h / 2;
  let minS = Math.min(...scores), maxS = Math.max(...scores);
  if (minS === maxS) { minS -= 0.05; maxS += 0.05; }
  const range = maxS - minS;
  const minY = minS - range * 0.1;
  const maxY = maxS + range * 0.15;
  const frac = (s - minY) / (maxY - minY);
  return _evoPAD.top + (1 - frac) * (h - _evoPAD.top - _evoPAD.bottom);
}

function evoFindAgent(name) {
  const evo = window._evoData;
  for (let i = 0; i < evo.length; i++)
    for (let j = 0; j < evo[i].agents.length; j++)
      if (evo[i].agents[j].name === name) return { s: i, a: j, agent: evo[i].agents[j] };
  return null;
}

function evoLineage(toS, toA) {
  const links = [];
  let ag = window._evoData[toS].agents[toA], si = toS, ai = toA;
  while (ag && ag.parent) {
    const p = evoFindAgent(ag.parent);
    if (!p) break;
    links.push({ fromS: p.s, fromA: p.a, toS: si, toA: ai });
    ag = p.agent; si = p.s; ai = p.a;
  }
  return links;
}

function drawEvoChart() {
  const evo = window._evoData;
  if (!evo || !evo.length || !_evoCtx) return;

  const w = _evoW, h = _evoH;  // use cached dimensions from initEvoCanvas
  const ctx = _evoCtx;
  ctx.clearRect(0, 0, w, h);

  // Grid
  const scores = [];
  for (const it of evo) for (const a of it.agents) if (a.score !== null) scores.push(a.score);
  if (!scores.length) return;
  let minS = Math.min(...scores), maxS = Math.max(...scores);
  const globalBest = window._globalBest != null ? window._globalBest : maxS;
  const globalWorst = window._globalWorst != null ? window._globalWorst : minS;
  if (minS === maxS) { minS -= 0.05; maxS += 0.05; }
  const range = maxS - minS;
  const gridMin = minS - range * 0.1;
  const gridMax = maxS + range * 0.15;
  const gridRange = gridMax - gridMin;
  function gridY(v) { return _evoPAD.top + (1 - (v - gridMin) / gridRange) * (h - _evoPAD.top - _evoPAD.bottom); }

  const cs = getComputedStyle(document.documentElement);
  const gridColor = cs.getPropertyValue('--chart-grid').trim() || 'rgba(255,255,255,0.06)';
  const labelColor = cs.getPropertyValue('--chart-label').trim() || '#888';
  const accentColor = cs.getPropertyValue('--accent').trim() || '#B39DDB';
  const chartDotBest = cs.getPropertyValue('--chart-dot-best').trim() || '#86efac';
  const chartDotWorse = cs.getPropertyValue('--chart-dot-worse').trim() || '#fca5a5';
  const chartDotMuted = cs.getPropertyValue('--chart-dot-muted').trim() || '#6b7280';
  const chartDotDefault = cs.getPropertyValue('--chart-dot-default').trim() || '#94a3b8';
  const chartRed = cs.getPropertyValue('--red').trim() || '#ef4444';
  const lineColor = cs.getPropertyValue('--accent-glow').trim() || 'rgba(179,157,219,0.4)';
  const lineColorHL = accentColor;

  ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
  const step = niceStep(gridRange, 6);
  for (let v = Math.ceil(gridMin / step) * step; v <= gridMax; v += step) {
    const y = gridY(v);
    ctx.beginPath(); ctx.moveTo(_evoPAD.left, y); ctx.lineTo(w - _evoPAD.right, y); ctx.stroke();
    ctx.fillStyle = labelColor; ctx.font = "11px system-ui, sans-serif";
    ctx.textAlign = "right"; ctx.textBaseline = "middle";
    ctx.fillText(fmtScore(v), _evoPAD.left - 8, y);
  }

  // Y label
  ctx.save();
  ctx.translate(12, (h - _evoPAD.bottom + _evoPAD.top) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = labelColor; ctx.font = "500 13px system-ui, sans-serif";
  ctx.textAlign = "center"; ctx.fillText("Score", 0, 0);
  ctx.restore();

  // X labels
  for (let i = 0; i < evo.length; i++) {
    const x = evoIterCenterX(i, w);
    ctx.fillStyle = labelColor; ctx.font = "11px system-ui, sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    ctx.fillText("R" + evo[i].iter, x, h - _evoPAD.bottom + 10);
  }

  // Highlight column
  const stepX = evoIterCenterX(_evoHoverStep >= 0 ? _evoHoverStep : _evoCurrentStep, w);
  const colW = (w - _evoPAD.left - _evoPAD.right) / evo.length;
  ctx.fillStyle = cs.getPropertyValue('--hover-bg').trim() || 'rgba(179,157,219,0.05)';
  ctx.fillRect(stepX - colW / 2, _evoPAD.top, colW, h - _evoPAD.top - _evoPAD.bottom);

  // Best-so-far frontier
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 2;
  ctx.setLineDash([]);
  ctx.beginPath();
  for (let i = 0; i < evo.length; i++) {
    const x0 = evoIterCenterX(i, w) - colW / 2 + 2;
    const x1 = evoIterCenterX(i, w) + colW / 2 - 2;
    const y = gridY(evo[i].best);
    if (i === 0) ctx.moveTo(x0, y);
    else {
      const yPrev = gridY(evo[i - 1].best);
      if (Math.abs(yPrev - y) > 0.5) { ctx.lineTo(x0, yPrev); ctx.lineTo(x0, y); }
    }
    ctx.lineTo(x1, y);
  }
  ctx.stroke();

  // Lineage lines
  const hlLinks = new Set(), hlAncestors = new Set();
  if (_evoHoverStep >= 0 && _evoHoverDot >= 0) {
    evoLineage(_evoHoverStep, _evoHoverDot).forEach(l => {
      hlLinks.add(l.fromS + "," + l.fromA + "," + l.toS + "," + l.toA);
      hlAncestors.add(l.fromS + "," + l.fromA);
    });
  }
  for (let i = 0; i < evo.length; i++) {
    for (let j = 0; j < evo[i].agents.length; j++) {
      const ag = evo[i].agents[j];
      if (!ag.parent) continue;
      const p = evoFindAgent(ag.parent);
      if (!p || p.agent.score === null || ag.score === null) continue;
      const key = p.s + "," + p.a + "," + i + "," + j;
      const isHL = hlLinks.has(key);
      ctx.strokeStyle = isHL ? lineColorHL : lineColor.replace(/[\d.]+\)$/, '0.07)');
      ctx.lineWidth = isHL ? 2 : 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath();
      ctx.moveTo(evoAgentX(p.s, p.a, w), gridY(p.agent.score));
      ctx.lineTo(evoAgentX(i, j, w), gridY(ag.score));
      ctx.stroke(); ctx.setLineDash([]);
    }
  }

  // Dots
  for (let i = 0; i < evo.length; i++) {
    const iter = evo[i];
    const isActive = i === _evoCurrentStep;
    const isHoverIter = i === _evoHoverStep;
    const isPinnedIter = i === _evoPinnedStep;
    const prevBest = i > 0 ? evo[i - 1].best : evo[0].best;

    for (let j = 0; j < iter.agents.length; j++) {
      const ag = iter.agents[j];
      const x = evoAgentX(i, j, w);
      const isHDot = (isHoverIter && j === _evoHoverDot) || (isPinnedIter && j === _evoPinnedDot && !isHoverIter);

      if (ag.score === null) {
        const y = gridY(gridMin + range * 0.02);
        const a = isActive || isHDot ? 0.8 : isHoverIter ? 0.5 : 0.3;
        ctx.strokeStyle = chartRed; ctx.globalAlpha = a; ctx.lineWidth = 2;
        const r = isHoverIter ? 5 : 4;
        ctx.beginPath(); ctx.moveTo(x - r, y - r); ctx.lineTo(x + r, y + r); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + r, y - r); ctx.lineTo(x - r, y + r); ctx.stroke();
        continue;
      }

      const y = gridY(ag.score);
      const isGlobalBest = ag.is_best || (ag.score === globalBest && globalBest != null);
      const isGlobalWorst = ag.is_worst || (ag.score === globalWorst && ag.score !== globalBest && globalWorst != null);
      const isAncestor = hlAncestors.has(i + "," + j);
      let radius = isHDot ? 8 : isAncestor || isHoverIter || isActive ? 6 : 4;
      let color = isGlobalBest ? chartDotBest : isGlobalWorst ? chartDotWorse : accentColor;
      if (!isHDot && !isActive && !isHoverIter) color = isAncestor ? chartDotMuted : chartDotDefault;
      const alpha = isHDot || isActive ? 1 : isAncestor ? 0.85 : isHoverIter ? 0.7 : 0.45;

      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI); ctx.fill();

      if (isHDot || isActive) {
        ctx.globalAlpha = 1;
        ctx.fillStyle = color;
        ctx.font = "bold 11px system-ui, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "bottom";
        ctx.fillText(fmtScore(ag.score), x, y - 10);
      }
      ctx.globalAlpha = 1;
    }
  }
}

// ── Evo card & leaderboard ──

function renderEvoCard() {
  const evo = window._evoData;
  if (!evo || !evo.length) return;
  const iter = evo[_evoCurrentStep];
  const chartEntry = CHART ? CHART.find(c => c.iter === iter.iter) : null;
  const prevBest = _evoCurrentStep > 0 ? evo[_evoCurrentStep - 1].best : evo[0].best;
  const globalBest = window._globalBest != null ? window._globalBest : null;
  const globalWorst = window._globalWorst != null ? window._globalWorst : null;
  const improved = chartEntry ? chartEntry.improved : iter.best > prevBest;

  let badge = "";
  if (_evoCurrentStep === 0) badge = '';
  else if (iter.agents.every(a => a.score === null)) badge = '<span class="evo-badge fail">Failed</span>';
  else if (improved) {
    const delta = chartEntry ? Math.abs(chartEntry.delta) : Math.abs(iter.best - prevBest);
    badge = '<span class="evo-badge up">+' + fmtScore(delta) + ' pts</span>';
  }
  else badge = '<span class="evo-badge neutral">No improvement</span>';

  const agentsHtml = iter.agents.map(ag => {
    const isGlobalBest = ag.is_best || (ag.score !== null && globalBest !== null && ag.score === globalBest);
    const isGlobalWorst = ag.is_worst || (ag.score !== null && globalWorst !== null && ag.score === globalWorst && ag.score !== globalBest);
    let color = ag.score === null ? 'var(--chart-dot-worse)' : isGlobalBest ? 'var(--chart-dot-best)' : isGlobalWorst ? 'var(--chart-dot-worse)' : 'var(--accent)';
    const label = ag.score === null ? "failed" : fmtScore(ag.score);
    return `<span class="evo-agent-item"><span class="evo-dot" style="background:${color}"></span>${esc(ag.name)} (${label})</span>`;
  }).join("");

  const card = document.getElementById('evoCard');
  if (card) card.innerHTML =
    `<div class="evo-card-header"><span class="evo-card-title">Round ${iter.iter}</span>${badge}</div>` +
    `<div class="evo-card-summary">${esc(iter.summary)}</div>` +
    `<div class="evo-card-agents">${agentsHtml}</div>`;

  const label = document.getElementById('evoLabel');
  if (label) label.textContent = "Round " + iter.iter + " / " + evo.length;
  const prev = document.getElementById('evoPrev');
  const next = document.getElementById('evoNext');
  if (prev) prev.disabled = _evoCurrentStep === 0;
  if (next) next.disabled = _evoCurrentStep === evo.length - 1;
}

function renderEvoLeaderboard() {
  const evo = window._evoData;
  if (!evo || !evo.length) return;

  // Show each loop's best score
  const items = evo.map((it, i) => ({
    label: "Round " + it.iter,
    score: it.best,
    idx: i,
    isOurs: i === evo.length - 1
  }));

  const lb = document.getElementById('evoLeaderboard');
  if (!lb) return;
  lb.innerHTML =
    '<div class="evo-lb-title">Round Best</div>' +
    items.map(it => {
      const active = it.idx === _evoCurrentStep ? " active" : "";
      const style = it.isOurs ? "font-weight:600;color:var(--green);" : active ? "color:var(--accent);" : "";
      return `<div class="evo-lb-item${active}" data-idx="${it.idx}" ` +
        `onmouseenter="evoLbHover(${it.idx})" onmouseleave="evoLbLeave()">` +
        `<span class="evo-lb-name" style="${style}">${it.label}</span>` +
        `<span class="evo-lb-rate" style="${style}">${fmtScore(it.score)}</span></div>`;
    }).join("");

  lb.querySelectorAll('.evo-lb-item').forEach(el => {
    el.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      _evoCurrentStep = idx;
      drawEvoChart(); renderEvoCard(); renderEvoLeaderboard();
    });
  });
}

function evoLbHover(idx) { _evoHoverStep = idx; drawEvoChart(); }
function evoLbLeave() { _evoHoverStep = -1; _evoHoverDot = -1; drawEvoChart(); renderEvoHoverDiff(); }

function renderEvoHoverDiff() {
  const evo = window._evoData;
  const el = document.getElementById('evoHoverDiff');
  if (!el) return;
  // Use pinned dot if set, otherwise hover; clear if neither
  const step = _evoPinnedStep >= 0 ? _evoPinnedStep : _evoHoverStep;
  const dot = _evoPinnedDot >= 0 ? _evoPinnedDot : _evoHoverDot;
  if (step < 0 || dot < 0) { el.innerHTML = ""; return; }
  const ag = evo[step].agents[dot];
  if (!ag) { el.innerHTML = ""; return; }
  if (ag._approach) {
    const a = ag._approach;
    const scoreStr = ag.score === null ? "failed" : fmtScore(ag.score);
    // Header: name + score
    let html = `<div style="margin-bottom:0.5rem"><strong style="color:var(--text-heading)">${esc(ag.name)}</strong> <span style="color:var(--accent);font-weight:600">(${scoreStr})</span></div>`;
    // Scored solution description. Do not fall back to the initial hypothesis.
    const solutionDesc = (a.final_result && a.final_result.description) || a.solution_description || a.description || '';
    if (solutionDesc) {
      html += `<div style="margin:0.3rem 0"><div style="font-size:0.68rem;color:var(--accent-secondary);text-transform:uppercase;letter-spacing:0.06em">Solution description</div>`;
      html += `<p style="color:var(--text-muted);font-size:0.75rem;margin:0.2rem 0">${esc(solutionDesc)}</p></div>`;
    } else if (ag.score !== null) {
      html += `<p style="color:var(--text-muted);font-size:0.75rem;margin:0.3rem 0">No scored solution description recorded for this result.</p>`;
    }
    // Initial hypothesis is available but collapsed by default.
    if (a.initial_hypothesis_description) {
      html += `<details style="margin:0.3rem 0"><summary style="font-size:0.72rem;color:var(--text-muted)">Initial approach description</summary>`;
      html += `<p style="font-size:0.72rem;color:var(--text-muted)">${esc(a.initial_hypothesis_description)}</p></details>`;
    }
    if (a.approach_md) {
      html += `<details style="margin:0.3rem 0"><summary style="font-size:0.72rem;color:var(--text-muted)">Initial approach details</summary>`;
      html += `<div style="font-size:0.72rem;color:var(--text-muted)">${md(a.approach_md)}</div></details>`;
    }
    // Experiment log (deferred in overview mode)
    if (a.experiment_log) {
      html += `<details style="margin:0.3rem 0"><summary style="font-size:0.72rem;color:var(--text-muted)">Experiment Log</summary>`;
      html += `<div style="font-size:0.72rem;color:var(--text-muted)">${md(a.experiment_log)}</div></details>`;
    } else if (a.has_experiment_log) {
      html += `<div style="font-size:0.72rem;color:var(--text-muted)">Experiment log available (click approach to view)</div>`;
    }
    // Code files (deferred in overview mode)
    if (a.code_files && Object.keys(a.code_files).length) {
      html += `<details style="margin:0.3rem 0"><summary style="font-size:0.72rem;color:var(--text-muted)">Code (${Object.keys(a.code_files).length} file${Object.keys(a.code_files).length > 1 ? 's' : ''})</summary>`;
      for (const [fname, content] of Object.entries(a.code_files)) {
        html += `<div style="font-size:11px;font-weight:600;color:var(--text-muted);margin:0.2rem 0">${esc(fname)}</div>`;
        html += `<div class="code-block" style="font-size:10px;max-height:120px;overflow-y:auto">${highlight(content, fname.endsWith('.py') ? 'python' : '')}</div>`;
      }
      html += '</details>';
    } else if (a.has_code_files) {
      html += `<div style="font-size:0.72rem;color:var(--text-muted)">Code files available (${a.code_file_count || '?'}) — click approach to view</div>`;
    }
    // Result
    if (a.final_result) {
      html += `<details style="margin:0.3rem 0"><summary style="font-size:0.72rem;color:var(--text-muted)">Result</summary>`;
      html += `<div class="code-block" style="font-size:10px">${highlight(JSON.stringify(a.final_result, null, 2), 'json')}</div></details>`;
    }
    el.innerHTML = html;
  } else {
    const scoreStr = ag.score === null ? "failed" : fmtScore(ag.score);
    el.innerHTML = `<div class="evo-diff-agent"><strong>${esc(ag.name)}</strong> (${scoreStr})</div>`;
  }
}

function evoStep(dir) {
  const evo = window._evoData;
  const next = _evoCurrentStep + dir;
  if (!evo || next < 0 || next >= evo.length) return;
  _evoCurrentStep = next; _evoHoverStep = -1;
  drawEvoChart(); renderEvoCard(); renderEvoLeaderboard();
}

function evoHitTestIter(mx, w) {
  const evo = window._evoData;
  let best = -1, bestD = Infinity;
  for (let i = 0; i < evo.length; i++) {
    const d = Math.abs(mx - evoIterCenterX(i, w));
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function evoHitTestDot(mx, my, w, h) {
  const evo = window._evoData;
  for (let i = 0; i < evo.length; i++) {
    for (let j = 0; j < evo[i].agents.length; j++) {
      const ag = evo[i].agents[j];
      const x = evoAgentX(i, j, w);
      const y = ag.score !== null ? evoScoreY(ag.score, h) : evoScoreY(0, h);
      if (Math.sqrt((mx - x) ** 2 + (my - y) ** 2) < 14) return { s: i, a: j };
    }
  }
  return null;
}

function _evoChartSize() {
  return { w: _evoW, h: _evoH };
}

function _evoMouseCoords(e) {
  if (!_evoChart) return { mx: 0, my: 0, w: 0, h: 0 };
  const r = _evoChart.getBoundingClientRect();
  return {
    mx: e.clientX - r.left,
    my: e.clientY - r.top,
    w: _evoW,
    h: _evoH,
  };
}

function onEvoClick(e) {
  if (!_evoChart) return;
  const { mx, my, w, h } = _evoMouseCoords(e);
  const hit = evoHitTestDot(mx, my, w, h);
  if (hit) {
    _evoCurrentStep = hit.s;
    // Toggle pin: clicking the same dot unpins, clicking a different dot pins it
    if (_evoPinnedStep === hit.s && _evoPinnedDot === hit.a) {
      _evoPinnedStep = -1; _evoPinnedDot = -1;
    } else {
      _evoPinnedStep = hit.s; _evoPinnedDot = hit.a;
    }
    _evoHoverStep = -1;
    drawEvoChart(); renderEvoCard(); renderEvoLeaderboard(); renderEvoHoverDiff();
  }
}

function onEvoMouseMove(e) {
  if (!_evoChart) return;
  const { mx, my, w, h } = _evoMouseCoords(e);

  const it = evoHitTestIter(mx, w);
  let dt = -1;
  if (it >= 0) {
    let bestDist = 20;
    for (let j = 0; j < window._evoData[it].agents.length; j++) {
      const ag = window._evoData[it].agents[j];
      const ax = evoAgentX(it, j, w);
      const ay = ag.score !== null ? evoScoreY(ag.score, h) : evoScoreY(0, h);
      const d = Math.sqrt((mx - ax) ** 2 + (my - ay) ** 2);
      if (d < bestDist) { bestDist = d; dt = j; }
    }
  }

  _evoChart.style.cursor = evoHitTestDot(mx, my, w, h) ? "pointer" : "default";
  if (it !== _evoHoverStep || dt !== _evoHoverDot) {
    _evoHoverStep = it; _evoHoverDot = dt;
    drawEvoChart(); renderEvoHoverDiff();
  }
}

function onEvoMouseLeave() {
  _evoHoverStep = -1; _evoHoverDot = -1;
  drawEvoChart(); renderEvoHoverDiff();
}

// Keyboard nav for evo chart
document.addEventListener('keydown', function(e) {
  if (currentSection !== 'overview') return;
  if (e.key === 'ArrowLeft') evoStep(-1);
  if (e.key === 'ArrowRight') evoStep(1);
});

// Resize handler for evo chart
window.addEventListener('resize', function() {
  if (currentSection !== 'overview') return;
  if (_evoChart) { initEvoCanvas(); drawEvoChart(); }
});

// ========== Snapshot mode ==========
// When opened as a static snapshot, window.__SNAPSHOT_DATA__ is pre-populated
// with all API responses, so no live server is needed.
const _isSnapshot = typeof window.__SNAPSHOT_DATA__ !== 'undefined';

function _applySnapshotData() {
  const sd = window.__SNAPSHOT_DATA__;
  if (!sd) return;
  RUN = sd.run_data || null;
  CHART = sd.score_chart || [];
  window._globalBest = sd.global_best != null ? sd.global_best : null;
  window._globalWorst = sd.global_worst != null ? sd.global_worst : null;
  TIMELINE = sd.timeline || [];

  // Merge approach details directly into RUN so rendering code never
  // needs to lazy-load.  This makes the snapshot fully self-contained.
  const details = sd.approach_details || {};
  const convs = sd.conversations || {};
  if (RUN && RUN.loops) {
    for (const loop of RUN.loops) {
      // Merge prepare conversation
      if (!loop.prepare_conversation && convs['prepare']) {
        loop.prepare_conversation = convs['prepare'];
      }
      // Merge propose conversation
      const proposeKey = 'loop_' + loop.loop_index + '_propose';
      if (!loop.propose_conversation && convs[proposeKey]) {
        loop.propose_conversation = convs[proposeKey];
      }
      // Merge approach details & conversations into each approach
      for (const a of (loop.approaches || [])) {
        const aid = a.approach_id;
        const d = details[aid];
        if (d) {
          if (!a.code_files && d.code_files) a.code_files = d.code_files;
          if (!a.experiment_log && d.experiment_log) a.experiment_log = d.experiment_log;
          if (!a.subagent_conversations && d.subagent_conversations) a.subagent_conversations = d.subagent_conversations;
          if (!a.approach_md && d.approach_md) a.approach_md = d.approach_md;
          if (!a.final_result && d.final_result) a.final_result = d.final_result;
          if (!a.solution_description && d.solution_description) a.solution_description = d.solution_description;
          if (!a.description && d.description) a.description = d.description;
          if (!a.initial_hypothesis_description && d.initial_hypothesis_description) a.initial_hypothesis_description = d.initial_hypothesis_description;
        }
        if (!a.subagent_conversations && convs[aid]) {
          a.subagent_conversations = [convs[aid]];
        }
      }
    }
  }

  // Also populate caches as fallback
  for (const [id, detail] of Object.entries(details)) {
    if (detail) _approachDetailCache[id] = detail;
  }
  for (const [key, conv] of Object.entries(convs)) {
    if (conv) _conversationCache[key] = conv;
  }
}

// ========== Init ==========
if (_isSnapshot) {
  _applySnapshotData();
  document.getElementById('snapshot-badge').style.display = 'inline-block';
  const dot = document.getElementById('live-indicator');
  if (dot) dot.style.display = 'none';
  renderAll();
} else {
  connectSSE();
  fetchRunData();
  _pollTimer = setInterval(fetchRunData, _pollInterval);
  _convPollTimer = setInterval(refreshOpenConversations, _CONV_POLL_INTERVAL);
}
</script>
</body></html>
