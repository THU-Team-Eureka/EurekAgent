<style>
/* Material Symbols */
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ---- Theme variables ---- */
:root {
  --header-bg: #1A1A1B;
  --sidebar-bg: #242426;
  --main-bg: #191c1e;
  --card-bg: #272a2c;
  --card-bg-hover: #373a3b;
  --card-bg-alt: #323537;
  --border-subtle: rgba(64,72,76,0.1);
  --text-heading: #F2F0F1;
  --text-muted: #9B9B9B;
  --code-bg: #1e1e2e;
  --code-text: #cdd6f4;
  --code-kw: #cba6f7; --code-str: #a6e3a1; --code-num: #fab387; --code-cm: #6c7086;
  --user-bg: #272a2c; --user-border: #40484c;
  --assistant-bg: #272a2c; --assistant-border: #40484c;
  --tool-bg: #272a2c; --tool-border: #40484c;
  --thinking-bg: #272a2c; --thinking-border: #40484c;
  --user-text: #e1e2e5; --assistant-text: #e1e2e5; --tool-text: #c0c8cd; --thinking-text: #e1e2e5;
  --user-role: #7C3AED; --assistant-role: #B39DDB; --tool-role: #CE93D8; --thinking-role: #CE93D8;
  --surface-code: #323537;
  --chart-grid: rgba(255,255,255,0.06); --chart-label: #888;
  --diff-add-bg: rgba(34,197,94,0.08); --diff-del-bg: rgba(239,68,68,0.08);
  --hover-bg: rgba(179,157,219,0.06);
  --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
  --accent-secondary: #CE93D8;
  --log-info: #B39DDB; --log-exec: #CE93D8; --log-sync: #A855F7; --log-time: rgba(206,147,216,0.4);
  --accent: #B39DDB;
  --accent-dim: rgba(179,157,219,0.25);
  --accent-glow: rgba(179,157,219,0.4);
  --scrollbar-track: #1A1A1B; --scrollbar-thumb: #3E3E40;
  --status-success-bg: rgba(47,158,68,0.25); --status-success-text: #4ade80;
  --status-error-bg: rgba(255,84,73,0.25); --status-error-text: #f87171;
  --status-warning-bg: rgba(232,89,12,0.25); --status-warning-text: #fb923c;
  --badge-on-accent: #1B0033;
  --nav-active-bg: rgba(62,62,64,0.5);
  --chart-bar-green: rgba(163,230,53,0.4); --chart-bar-green-border: #a3e635;
  --chart-bar-amber: rgba(251,191,36,0.4); --chart-bar-amber-border: #fbbf24;
  --chart-dot-best: #22c55e; --chart-dot-worse: #fca5a5; --chart-dot-muted: #6b7280; --chart-dot-default: #94a3b8;
  --live-dot: #2f9e44;
}
html:not(.dark) {
  --header-bg: #ffffff;
  --sidebar-bg: #f6f7f9;
  --main-bg: #f3f4f6;
  --card-bg: #ffffff;
  --card-bg-hover: #eef1f4;
  --card-bg-alt: #e9ecef;
  --border-subtle: #d0d7de;
  --text-heading: #111827;
  --text-muted: #374151;
  --code-bg: #f6f8fa;
  --code-text: #1f2937;
  --code-kw: #7c3aed; --code-str: #16a34a; --code-num: #c2410c; --code-cm: #9ca3af;
  --user-bg: #f0ecf4fb; --user-border: #c4b5fd;
  --assistant-bg: #f0ecf4fb; --assistant-border: #c4b5fd;
  --tool-bg: #f8f7fc; --tool-border: #d1d5db;
  --thinking-bg: #f8f7fc; --thinking-border: #d1d5db;
  --user-text: #111827; --assistant-text: #111827; --tool-text: #374151; --thinking-text: #111827;
  --user-role: #6d28d9; --assistant-role: #7C3AED; --tool-role: #9333ea; --thinking-role: #9333ea;
  --surface-code: #eef1f4;
  --chart-grid: rgba(0,0,0,0.08); --chart-label: #374151;
  --diff-add-bg: rgba(22,163,74,0.08); --diff-del-bg: rgba(220,38,38,0.08);
  --hover-bg: rgba(124,58,237,0.08);
  --green: #16a34a; --red: #dc2626; --orange: #d97706;
  --log-info: #493aed; --log-exec: #9a49e5; --log-sync: #7024eb; --log-time: rgba(147,51,234,0.4);
  --accent-secondary: #7C3AED;
  --accent: #7C3AED;
  --accent-dim: rgba(124,58,237,0.18);
  --accent-glow: rgba(124,58,237,0.4);
  --scrollbar-track: #f1f3f5; --scrollbar-thumb: #adb5bd;
  --status-success-bg: #dcfce7; --status-success-text: #15803d;
  --status-error-bg: #fee2e2; --status-error-text: #b91c1c;
  --status-warning-bg: #ffedd5; --status-warning-text: #c2410c;
  --badge-on-accent: #fff;
  --nav-active-bg: rgba(124,58,237,0.18);
  --chart-bar-green: rgba(163,230,53,0.4); --chart-bar-green-border: #a3e635;
  --chart-bar-amber: rgba(251,191,36,0.4); --chart-bar-amber-border: #fbbf24;
  --chart-dot-best: #22c55e; --chart-dot-worse: #fca5a5; --chart-dot-muted: #9ca3af; --chart-dot-default: #cbd5e1;
  --live-dot: #16a34a;
}

/* ---- Live indicator ---- */
.live-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--live-dot); animation:pulse 1.5s infinite; margin-left:2px; vertical-align:middle; }
.live-dot.finished { background:var(--text-muted); animation:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.spin { animation:spin 1.5s linear infinite; }
@keyframes runBounce {
  0%,100% { transform:translateY(0) scaleX(1); }
  25% { transform:translateY(-2px) scaleX(0.95); }
  50% { transform:translateY(0) scaleX(1); }
  75% { transform:translateY(-1px) scaleX(0.97); }
}
@keyframes colorPulse {
  0%,100% { color:var(--accent); opacity:1; }
  50% { color:var(--accent-secondary); opacity:0.5; }
}
.run-pulse { animation:colorPulse 1.5s ease-in-out infinite; }
.run-bounce { animation:colorPulse 1.5s ease-in-out infinite; }

/* ---- Status badges ---- */
.status-badge { font-size:12px; padding:2px 8px; border-radius:999px; font-weight:500; }
.status-running { background:var(--accent-dim); color:var(--accent); }
.status-success { background:var(--status-success-bg); color:var(--status-success-text); }
.status-abort, .status-interrupted, .status-error { background:var(--status-error-bg); color:var(--status-error-text); }
.status-loop { background:var(--status-warning-bg); color:var(--status-warning-text); }

/* ---- Code blocks ---- */
.code-block { background:var(--code-bg); color:var(--code-text); padding:10px 14px; border-radius:6px; font-family:'SF Mono','Fira Code',monospace; font-size:12px; overflow-x:auto; margin:6px 0; white-space:pre; }
.code-block .kw { color:var(--code-kw); }
.code-block .str { color:var(--code-str); }
.code-block .num { color:var(--code-num); }
.code-block .cm { color:var(--code-cm); }

/* ---- Chat Thread ---- */
.conv-user { padding:10px 14px; margin:8px 0; border-radius:8px; border-left:3px solid var(--user-role); background:var(--user-bg); color:var(--user-text); font-size:14px; }
.conv-user .conv-role { font-size:11px; font-weight:600; color:var(--user-role); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.conv-user .conv-text { max-height:120px; overflow:hidden; position:relative; transition:max-height .25s ease; }
.conv-user .conv-text.collapsed::after { content:''; position:absolute; bottom:0; left:0; right:0; height:40px; background:linear-gradient(transparent, var(--user-bg)); pointer-events:none; }
.conv-user .conv-text.expanded { max-height:none; }
.conv-user .conv-text.expanded::after { display:none; }
.conv-expand-btn { font-size:11px; font-weight:600; color:var(--accent-secondary); cursor:pointer; padding:4px 0; user-select:none; }
.conv-expand-btn:hover { text-decoration:underline; }
.conv-assistant { padding:10px 14px; margin:8px 0; border-radius:8px; border-left:3px solid var(--assistant-role); background:var(--assistant-bg); color:var(--assistant-text); font-size:14px; }
.conv-assistant .conv-role { font-size:11px; font-weight:600; color:var(--assistant-role); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.conv-text { white-space:pre-wrap; word-break:break-word; line-height:1.5; }
.conv-text p { margin:4px 0; }
.conv-image-list { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
.conv-image-card { display:inline-flex; flex-direction:column; gap:4px; max-width:min(360px, 100%); padding:6px; border:1px solid var(--border-subtle); border-radius:8px; background:var(--card-bg); }
.conv-image-card img { display:block; max-width:100%; max-height:360px; object-fit:contain; border-radius:6px; background:#fff; }
.conv-image-caption { font-size:11px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.conv-chip { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 10px; border-radius:999px; cursor:pointer; user-select:none; margin-top:6px; transition:all .15s; }
.conv-chip:hover { filter:brightness(1.2); }
.conv-chip-thinking { background:var(--accent-dim); color:var(--accent); }
.conv-chip-tools { background:var(--accent-dim); color:var(--accent); }
.conv-tools-list { margin-top:8px; padding-left:4px; border-left:2px solid var(--border-subtle); }
.conv-tool-row { padding:4px 8px; font-size:12px; border-radius:4px; margin:2px 0; }
.conv-tool-row:hover { background:var(--hover-bg); }
.conv-tool-badge { display:inline-block; font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px; margin-right:6px; background:var(--accent); color:var(--badge-on-accent); }
.conv-tool-preview { color:var(--text-muted); font-size:11px; margin-left:4px; }
.conv-tool-detail { margin:4px 0 4px 0; }
.conv-thinking-content { color:var(--text-muted); font-style:italic; white-space:pre-wrap; font-size:13px; padding:6px 0; }

/* ---- Activity Strip ---- */
.activity-strip { display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:8px 12px; background:var(--card-bg-alt); border-radius:6px; margin-bottom:12px; font-size:12px; }
.activity-chip { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:999px; background:var(--hover-bg); color:var(--text-muted); cursor:pointer; font-weight:500; transition:all .15s; }
.activity-chip:hover { background:var(--accent-dim); color:var(--accent); }
.activity-arrow { color:var(--text-muted); opacity:0.4; font-size:10px; }
.activity-label { font-size:11px; color:var(--text-muted); opacity:0.6; }

/* ---- Collapsible ---- */
details { margin:4px 0; }
summary { cursor:pointer; font-size:13px; color:var(--text-muted); padding:4px 0; user-select:none; }
summary:hover { color:var(--text-heading); }
details[open] summary { margin-bottom:4px; }

/* ---- Tab bar ---- */
.tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border-subtle); margin-bottom:12px; }
.tab-btn { padding:6px 12px; font-size:12px; border:none; background:none; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-content { display:none; }
.tab-content.active { display:block; color:var(--text-muted); }

/* ---- Sub-agent ---- */
.subagent-section { border-left:3px solid var(--accent); padding-left:12px; margin:8px 0; }
.subagent-label { font-size:12px; font-weight:600; color:var(--accent); margin-bottom:4px; }

/* ---- Config grid ---- */
.config-grid { display:grid; grid-template-columns:140px 1fr; gap:4px 12px; font-size:13px; }
.config-grid dt { color:var(--text-muted); font-weight:500; }
.config-grid dd { color:var(--text-heading); }

/* ---- Approach card expand ---- */
.approach-card-body { display:none; }
.approach-card.expanded .approach-card-body { display:block; }

/* ---- Sidebar active state ---- */
.nav-link.active { color:var(--accent) !important; font-weight:bold; background:var(--nav-active-bg); border-radius:0.125rem; transform:scale(1.05); }

/* ---- Mobile sidebar ---- */
@media (max-width: 768px) {
  #sidebar { display:none; position:fixed; left:0; top:72px; z-index:200; width:260px; box-shadow:4px 0 12px rgba(0,0,0,0.3); }
  #sidebar.open { display:flex; }
}

/* ---- Results section ---- */
.evo-card { background:var(--card-bg); border:1px solid var(--border-subtle); border-radius:0.5rem; padding:1rem 1.25rem; margin-top:1rem; }
.evo-card-header { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem; }
.evo-card-title { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:0.95rem; color:var(--text-heading); }
.evo-card-summary { font-size:0.88rem; color:var(--text-muted); line-height:1.6; }
.evo-card-agents { margin-top:0.6rem; display:flex; flex-wrap:wrap; gap:0.5rem; }
.evo-badge { display:inline-block; font-size:0.72rem; font-weight:600; padding:0.15rem 0.5rem; border-radius:999px; }
.evo-badge.up { background:var(--diff-add-bg); color:var(--green); }
.evo-badge.fail { background:var(--diff-del-bg); color:var(--red); }
.evo-badge.neutral { background:var(--hover-bg); color:var(--text-muted); }
.evo-agent-item { display:inline-flex; align-items:center; gap:0.3rem; font-size:0.78rem; color:var(--text-muted); }
.evo-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.evo-controls { display:flex; align-items:center; justify-content:center; gap:1rem; }
.evo-controls-row { display:flex; gap:1.25rem; align-items:center; justify-content:center; margin-top:0.75rem; }
.evo-controls button { background:var(--card-bg); border:1px solid var(--border-subtle); border-radius:0.375rem; padding:0.4rem 0.9rem; font-size:0.82rem; color:var(--text-muted); cursor:pointer; transition:all .2s; }
.evo-controls button:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.evo-controls button:disabled { opacity:0.35; cursor:default; }
.evo-step-label { font-family:'Space Grotesk'; font-size:0.88rem; font-weight:500; min-width:120px; text-align:center; color:var(--text-heading); }
.evo-leaderboard { min-width:180px; max-width:200px; flex-shrink:0; }
.evo-lb-title { font-family:'Space Grotesk'; font-size:0.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.4rem; padding-bottom:0.3rem; border-bottom:1px solid var(--border-subtle); }
.evo-lb-item { display:flex; justify-content:space-between; align-items:center; padding:0.3rem 0.4rem; border-radius:0.25rem; cursor:pointer; font-size:0.78rem; transition:background .15s; }
.evo-lb-item:hover { background:var(--hover-bg); }
.evo-lb-item.active { background:var(--hover-bg); }
.evo-lb-name { color:var(--text-muted); }
.evo-lb-rate { color:var(--text-muted); font-variant-numeric:tabular-nums; }
.evo-hover-diff { width:300px; flex-shrink:0; font-size:0.78rem; padding:0.5rem; height:340px; overflow-y:auto; }
.evo-diff-agent { font-weight:600; color:var(--text-heading); }
.evo-diff-line { padding:0.12rem 0.3rem; border-radius:2px; margin:0.1rem 0; font-family:'Fira Code',monospace; font-size:0.72rem; white-space:pre-wrap; word-break:break-all; }
.evo-diff-add { background:var(--diff-add-bg); color:var(--green); }
.evo-diff-del { background:var(--diff-del-bg); color:var(--red); }
.evo-chart-row { display:flex; gap:1.25rem; align-items:flex-start; justify-content:center; }
.evo-chart-wrap { flex:1; min-width:0; background:var(--card-bg); border:1px solid var(--border-subtle); border-radius:0.5rem; padding:0.75rem; overflow:hidden; }
.evo-chart-wrap canvas { display:block; width:100% !important; height:320px !important; cursor:default; }
@media (max-width:900px) {
  .evo-chart-row { flex-direction:column; }
  .evo-leaderboard, .evo-hover-diff { max-width:100%; min-width:0; }
}
</style>
</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary/30">

<!-- TopNavBar -->
<header class="w-full top-0 sticky flex items-center px-4 md:px-6 py-3 z-50" style="background:var(--header-bg); box-shadow:0px 15px 40px var(--hover-bg);">
<div class="flex items-center gap-2 md:gap-4">
  <button class="md:hidden material-symbols-outlined text-on-surface" onclick="toggleSidebar()">menu</button>
  <h1 class="text-xl md:text-2xl font-bold tracking-tighter font-['Space_Grotesk']" style="color:var(--text-heading)">EurekAgent</h1>
  <span class="font-mono text-xs hidden sm:inline" style="color:var(--accent)" id="header-run-id"></span>
  <span class="status-badge" id="header-status"></span>
  <span class="live-dot" id="live-indicator" title="Pipeline running"></span>
  <span class="snapshot-badge" id="snapshot-badge" style="display:none;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--card);color:var(--text-muted);border:1px solid rgba(255,255,255,0.1)">SNAPSHOT</span>
</div>
<span class="hidden md:block w-2"></span>
<nav class="hidden md:flex gap-5 items-center border-l pl-5" style="border-color:rgba(64,72,76,0.3)">
  <div class="flex flex-col">
    <span class="text-[10px] uppercase tracking-widest font-headline leading-none mb-0.5" style="color:var(--accent)">API Cost</span>
    <div class="flex gap-3">
      <span class="font-mono text-xs" style="color:var(--accent)" id="token-usage">Usage: --</span>
      <span class="font-mono text-xs" style="color:var(--text-muted)" id="token-limit">Limit: --</span>
    </div>
  </div>
  <div class="flex flex-col border-l pl-5" style="border-color:rgba(64,72,76,0.2)">
    <span class="text-[10px] uppercase tracking-widest font-headline leading-none mb-0.5" style="color:var(--accent-secondary)">Time</span>
    <div class="flex gap-3">
      <span class="font-mono text-xs" style="color:var(--accent-secondary)" id="time-uptime">Uptime: --</span>
      <span class="font-mono text-xs" style="color:var(--text-muted)" id="time-limit">Limit: --</span>
    </div>
  </div>
</nav>
<div class="flex items-center gap-3 ml-auto">
  <div class="hidden md:flex flex-col items-end" style="color:var(--accent)">
    <span class="text-[10px] uppercase tracking-widest font-headline leading-none mb-0.5">Progress</span>
    <div class="flex items-center gap-2">
      <span class="font-mono text-xs" id="loop-current">0</span>
      <div class="w-32 h-2.5 rounded-full overflow-hidden" style="background:var(--main-bg)">
        <div class="h-full rounded-full transition-all duration-500" id="loop-progress-bar" style="width:0%; background:linear-gradient(90deg, var(--user-role), var(--accent), var(--accent-secondary)); box-shadow:0 0 8px var(--accent-glow)"></div>
      </div>
      <span class="font-mono text-xs" style="color:var(--text-muted)" id="loop-max">/ ? Rounds</span>
    </div>
  </div>
  <button class="material-symbols-outlined hover:text-primary transition-colors" style="color:var(--accent-secondary)" onclick="toggleTheme()" id="theme-btn">dark_mode</button>
</div>
</header>

<div class="flex">
<!-- SideNavBar (dynamic) -->
<aside id="sidebar" class="min-h-[calc(100vh-72px)] w-64 left-0 sticky top-[72px] flex flex-col py-8 px-4 font-['Space_Grotesk'] font-medium z-40" style="background-color:var(--sidebar-bg)!important">
</aside>

<!-- Main Content Area -->
<main id="main-content" class="flex-1 p-4 md:p-8 min-h-screen overflow-x-hidden" style="background:var(--main-bg)">
  <div class="max-w-7xl mx-auto">
    <p style="color:var(--text-muted)">Loading...</p>
  </div>
</main>
</div>

<!-- Mobile Bottom NavBar -->
<footer class="md:hidden fixed bottom-0 left-0 right-0 flex justify-around items-center py-3 z-50" style="background:var(--header-bg); border-top:1px solid rgba(64,72,76,0.1)">
  <button class="material-symbols-outlined" style="color:var(--accent)" onclick="showSection('overview')">cyclone</button>
  <button class="material-symbols-outlined" style="color:var(--accent-secondary)" onclick="toggleTheme()">dark_mode</button>
</footer>

<script>
const RUN_ID = "{{ run_id }}";
let RUN = null;
let CHART = null;
let TIMELINE = [];
const PAGE_START = Date.now();

// ========== Theme ==========
function _updateLogo() {
  const isDark = document.documentElement.classList.contains('dark');
  document.querySelectorAll('.logo-img').forEach(img => {
    img.src = isDark ? '/EurekAgent1.png' : '/EurekAgent1.png';
  });
}
function toggleTheme() {
  const html = document.documentElement;
  const next = html.classList.contains('dark') ? 'light' : 'dark';
  if (next === 'dark') html.classList.add('dark');
  else html.classList.remove('dark');
  document.getElementById('theme-btn').textContent = next === 'dark' ? 'dark_mode' : 'light_mode';
  try { localStorage.setItem('eurekagent-theme', next); } catch(e) {}
  _updateLogo();
}
(function() {
  try {
    const t = localStorage.getItem('eurekagent-theme');
    if (t === 'light') {
      document.documentElement.classList.remove('dark');
      document.getElementById('theme-btn').textContent = 'light_mode';
    }
  } catch(e) {}
  _updateLogo();
})();

// ========== Sidebar ==========
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function buildSidebar() {
  const nav = document.getElementById('sidebar');
  let html = '';

  // Header
  html += `<div class="flex items-center gap-3 mb-8 px-2">
    <img src="/EurekAgent1.png" alt="EurekAgent" class="w-10 h-10 rounded logo-img" style="object-fit:contain"/>
    <div>
      <div class="font-bold leading-tight" style="color:var(--text-heading)">EurekAgent</div>
      <div class="text-xs" style="color:var(--accent-secondary)">Active Rounds</div>
    </div>
  </div>`;

  html += '<nav class="flex-1 space-y-1">';

  // Dashboard
  html += navLink('overview', 'dashboard', 'Dashboard');

  // Pipeline state (shared by Prepare and Loops sections)
  const isPipelineFinished = ['success','abort','interrupted','error','loop'].includes(RUN.summary.final_status || '');
  const curLoopIdx = RUN.metadata._current_loop_index || 0;
  const curStage = RUN.metadata._current_stage || '';
  const pipelineRunning = !isPipelineFinished;

  // Prepare stage (runs once before any rounds)
  const hasPrepareData = RUN.loops.some(l => l.prepare_result != null || l.prepare_conversation != null);
  const isPrepareRunning = curStage === 'prepare' && pipelineRunning;
  const prepareResult = RUN.loops.find(l => l.prepare_result != null);
  const prepareDone = prepareResult && prepareResult.prepare_result && prepareResult.prepare_result.status === 'ready';
  const prepareBad = prepareResult && prepareResult.prepare_result && ['abort','error','interrupted'].includes(prepareResult.prepare_result.status);
  const prepareIcon = prepareDone
    ? `<span class="material-symbols-outlined text-sm ml-auto" style="color:var(--green);font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">check_circle</span>`
    : prepareBad
    ? `<span class="material-symbols-outlined text-sm ml-auto" style="color:var(--red);font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">cancel</span>`
    : isPrepareRunning || (!prepareResult && pipelineRunning)
    ? `<span class="material-symbols-outlined run-bounce text-sm ml-auto" style="color:var(--accent)">directions_run</span>`
    : '';
  if (hasPrepareData || isPrepareRunning || pipelineRunning) {
    html += `<a class="nav-link flex items-center gap-3 px-3 py-2 font-mono text-xs cursor-pointer transition-transform duration-200 hover:translate-x-1" style="color:var(--text-muted)" data-section="prepare" onclick="showSection('prepare')">
      <span class="material-symbols-outlined text-sm">science</span><span>Prepare</span>
      ${prepareIcon}
    </a>`;
  }

  // Loops — include in-progress loops that don't yet have result files
  // Skip loop 0 if it only has prepare data (no propose/implement) — shown above as "Prepare"
  // Build the set of loop indices to display
  const loopIndices = new Set(RUN.loops.filter(l => l.propose_result != null || l.implement_result != null || l.approaches?.length > 0).map(l => l.loop_index));
  if (pipelineRunning && curLoopIdx > 0) {
    // Add the current in-progress loop (and any skipped indices up to it)
    for (let i = 1; i <= curLoopIdx; i++) loopIndices.add(i);
  }
  const sortedLoopIndices = [...loopIndices].sort((a, b) => a - b);
  for (const li of sortedLoopIndices) {
    const loop = RUN.loops.find(l => l.loop_index === li);
    const isLast = li === (sortedLoopIndices.length > 0 ? sortedLoopIndices[sortedLoopIndices.length - 1] : 0);
    // Done only when BOTH propose and implement completed successfully
    const hasBothResults = loop != null && loop.propose_result != null && loop.implement_result != null;
    const _badStatuses = ['abort','all_failed','interrupted','error'];
    const implementRunning = loop != null && loop.implement_result != null && loop.implement_result.status === 'running';
    const eitherBad = hasBothResults && (loop.propose_result != null && _badStatuses.includes(loop.propose_result.status) || loop.implement_result != null && _badStatuses.includes(loop.implement_result.status));
    const isLoopDone = hasBothResults && !eitherBad && !implementRunning;
    const isPipelineAborted = ['abort','interrupted','error'].includes(RUN.summary.final_status || '');
    const isLoopIncomplete = (!hasBothResults && isPipelineAborted) || eitherBad;
    const isLoopRunning = (!hasBothResults || implementRunning) && !isPipelineAborted;
    const statusIcon = isLoopDone
      ? `<span class="material-symbols-outlined text-sm ml-auto" style="color:var(--green);font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">check_circle</span>`
      : isLoopIncomplete
      ? `<span class="material-symbols-outlined text-sm ml-auto" style="color:var(--red);font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">cancel</span>`
      : `<span class="material-symbols-outlined run-bounce text-sm ml-auto" style="color:var(--accent)">directions_run</span>`;
    const stageLabel = isLoopRunning && li === curLoopIdx ? ` (${curStage})` : '';

    html += `<a class="nav-link loop-parent flex items-center gap-3 px-3 py-2 font-mono text-xs cursor-pointer transition-transform duration-200 hover:translate-x-1${isLast ? ' active' : ''}" style="color:${isLast ? 'var(--accent)' : 'var(--text-muted)'}" data-section="loop-${li}-propose" onclick="showSection('loop-${li}-propose')">
      <span>Round ${li}${stageLabel}</span>
      ${statusIcon}
    </a>`;
  }

  html += '</nav>';

  nav.innerHTML = html;
  _updateLogo();
}

function navLink(section, icon, label) {
  return `<a class="nav-link flex items-center gap-3 px-3 py-2 font-mono text-xs cursor-pointer transition-transform duration-200 hover:translate-x-1" style="color:var(--text-muted)" onclick="showSection('${section}')" data-section="${section}">
    <span class="material-symbols-outlined text-sm">${icon}</span><span>${label}</span></a>`;
}

// ========== Header ==========
function buildHeader() {
  const m = RUN.metadata;
  const s = RUN.summary;
  document.getElementById('header-run-id').textContent = RUN.run_id;
  const status = s.final_status || m._pipeline_status || 'running';
  const badge = document.getElementById('header-status');
  badge.textContent = status;
  badge.className = 'status-badge status-' + ({success:'success', abort:'abort', interrupted:'interrupted', error:'abort', loop:'loop'}[status] || 'running');

  // Live indicator
  const dot = document.getElementById('live-indicator');
  if (dot) {
    const isFinished = ['success','abort','interrupted','error','loop'].includes(status);
    dot.className = isFinished ? 'live-dot finished' : 'live-dot';
    dot.title = isFinished ? 'Pipeline finished' : 'Pipeline running';
  }

  // Loop Progress — use _current_loop_index from server if available (covers in-progress loops)
  const currentLoop = m._current_loop_index || (RUN.loops.length > 0 ? Math.max(...RUN.loops.map(l => l.loop_index)) : 0);
  const maxLoops = m.max_loops || 0;
  const loopPct = maxLoops > 0 ? Math.min(100, (currentLoop / maxLoops) * 100) : 0;
  document.getElementById('loop-current').textContent = currentLoop;
  document.getElementById('loop-max').textContent = '/ ' + (maxLoops || '?') + ' Rounds';
  document.getElementById('loop-progress-bar').style.width = loopPct + '%';

  // Token Budget
  const tokenUsage = m.token_usage != null ? m.token_usage : '--';
  const tokenLimit = m.cost_limit != null ? m.cost_limit : '--';
  document.getElementById('token-usage').textContent = 'Usage: ' + tokenUsage;
  document.getElementById('token-limit').textContent = 'Limit: ' + (typeof tokenLimit === 'number' ? '$' + tokenLimit.toFixed(2) : tokenLimit);

  // Time Budget — use pipeline created_at from metadata (preserved across resume)
  const createdStr = m.created_at;
  const pipelineStart = TIMELINE.find(e => e.event === 'pipeline_start');
  const startTime = createdStr ? new Date(createdStr).getTime() : (pipelineStart ? new Date(pipelineStart.timestamp).getTime() : 0);
  const uptime = startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
  const h = Math.floor(uptime/3600); const min = Math.floor((uptime%3600)/60); const sec = uptime%60;
  document.getElementById('time-uptime').textContent = startTime ? 'Uptime: ' + String(h).padStart(2,'0') + ':' + String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0') : 'Uptime: --';
  const timeLimit = m.time_limit != null ? m.time_limit : '--';
  document.getElementById('time-limit').textContent = 'Limit: ' + timeLimit;
}

// ========== Section navigation ==========
let currentSection = '';

function showSection(id) {
  currentSection = id;
  const main = document.getElementById('main-content');
  let html = '<div class="max-w-7xl mx-auto space-y-8">';

  if (id === 'overview') html += renderOverview();
  else if (id === 'prepare') html += renderPrepareSection();
  else if (id.startsWith('loop-')) html += renderLoopSection(id);

  html += '</div>';
  main.innerHTML = html;

  // Update active nav
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(el => {
    // For loop items, match if the section belongs to that loop
    const section = el.getAttribute('data-section') || '';
    if (section === id) {
      el.classList.add('active');
      el.style.color = 'var(--accent)';
    } else if (section === 'prepare' && id === 'prepare') {
      el.classList.add('active');
      el.style.color = 'var(--accent)';
    } else if (id.startsWith('loop-') && section.startsWith('loop-')) {
      // Match loop parent when any sub-section of that loop is active
      const elLoopIdx = section.replace('loop-','').replace('-propose','').replace('-implement','').replace('-prepare','');
      const idLoopIdx = id.replace('loop-','').replace('-propose','').replace('-implement','').replace('-prepare','');
      if (elLoopIdx === idLoopIdx) {
        el.classList.add('active');
        el.style.color = 'var(--accent)';
      } else {
        el.style.color = 'var(--text-muted)';
      }
    } else {
      el.style.color = 'var(--text-muted)';
    }
  });
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  // Post-render: hide expand btn for short user messages
  setTimeout(() => { initCollapsibleUserTexts(); }, 0);

  // Post-render for evo chart in dashboard
  if (id === 'overview') {
    setTimeout(() => { initResultsCharts(); }, 0);
  }
}

// ========== Utilities ==========
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return esc(String(s || '')).replace(/'/g, '&#39;');
}

function md(text) {
  if (!text) return '';
  let h = esc(text);
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<div class="code-block">${highlight(code.trim(), lang)}</div>`);
  h = h.replace(/`([^`]+)`/g, '<code style="background:var(--surface-code);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/^### (.+)$/gm, '<h4 style="font-size:14px;font-weight:600;margin:8px 0 4px">$1</h4>');
  h = h.replace(/^## (.+)$/gm, '<h3 style="font-size:15px;font-weight:600;margin:10px 0 4px">$1</h3>');
  h = h.replace(/^# (.+)$/gm, '<h2 style="font-size:17px;font-weight:600;margin:12px 0 4px">$1</h2>');
  h = h.replace(/^- (.+)$/gm, '<div style="margin-left:16px">\u2022 $1</div>');
  h = h.replace(/^\d+\. (.+)$/gm, (m, c) => `<div style="margin-left:16px">${m.charAt(0)}. ${c}</div>`);
  h = h.replace(/\n\n/g, '</p><p>');
  h = '<p>' + h + '</p>';
  h = h.replace(/<p><\/p>/g, '');
  return h;
}

function highlight(code, lang) {
  if (!lang || lang === 'json') {
    try { code = JSON.stringify(JSON.parse(code), null, 2); } catch(e) {}
  }
  const tokens = [];
  let src = code;
  const patterns = [];
  if (lang === 'python' || lang === 'py') {
    patterns.push({re: /#.*$/gm, cls: 'cm'});
  }
  patterns.push({re: /(["'])(?:(?!\1)[^\\]|\\.)*?\1/g, cls: 'str'});
  patterns.push({re: /(?<!\x00)(\d+\.?\d*)(?!\x00)/g, cls: 'num'});
  for (const p of patterns) {
    src = src.replace(p.re, (m) => {
      const idx = tokens.length;
      tokens.push({cls: p.cls, text: m});
      return `\x00${idx}\x00`;
    });
  }
  let h = esc(src);
  if (lang === 'python' || lang === 'py') {
    h = h.replace(/\b(def|class|import|from|return|if|else|elif|for|while|in|not|and|or|is|None|True|False|try|except|finally|with|as|yield|lambda|pass|break|continue|raise|global|nonlocal|assert|del)\b/g, '<span class="kw">$1</span>');
  }
  for (let i = tokens.length - 1; i >= 0; i--) {
    h = h.replace(`\x00${i}\x00`, `<span class="${tokens[i].cls}">${esc(tokens[i].text)}</span>`);
  }
  return h;
}

function fmtScore(v) {
  if (v == null) return 'N/A';
  const abs = Math.abs(v);
  if (abs >= 1e6) return (v / 1e6).toFixed(2) + 'M';
  if (abs >= 1e4) return (v / 1e3).toFixed(1) + 'K';
  if (abs >= 1e3) return v.toFixed(1);
  if (abs >= 1) return v.toFixed(4);
  if (abs >= 0.001) return v.toFixed(4);
  return v.toPrecision(4);
}

function niceStep(range, targetSteps) {
  if (range <= 0) return 1;
  const rough = range / targetSteps;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const res = rough / mag;
  let nice;
  if (res <= 1.5) nice = 1;
  else if (res <= 3) nice = 2;
  else if (res <= 7) nice = 5;
  else nice = 10;
  return nice * mag;
}

// ========== Overview ==========
function _tokenPrice(type, count) {
  if (count == null) return null;
  const m = RUN.metadata;
  const rates = {
    input: m.input_token_price,
    cache_creation: m.cache_creation_token_price ?? m.input_token_price,
    cache_read: m.cache_read_token_price ?? m.input_token_price,
    output: m.output_token_price,
  };
  const rate = rates[type];
  if (rate == null) return null;
  return (count / 1000000) * rate;
}
function renderOverview() {
  const m = RUN.metadata;
  const s = RUN.summary;

  let html = '';

  // Hero grid: Execution Log + Cost Budget
  html += '<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">';

  // Execution Log
  html += `<div class="lg:col-span-8 rounded-xl overflow-hidden border flex flex-col" style="background:var(--header-bg); border-color:var(--border-subtle)">
    <div class="px-6 py-3 flex items-center justify-between flex-shrink-0" style="background:var(--sidebar-bg)">
      <div class="flex items-center gap-2">
        <div class="flex gap-1.5">
          <div class="w-3 h-3 rounded-full" style="background:var(--status-error-text);opacity:0.5"></div>
          <div class="w-3 h-3 rounded-full" style="background:var(--accent);opacity:0.5"></div>
          <div class="w-3 h-3 rounded-full" style="background:var(--accent-secondary);opacity:0.5"></div>
        </div>
        <span class="ml-4 font-mono text-xs uppercase" style="color:var(--accent-secondary); letter-spacing:0.1em">Execution Log</span>
      </div>
      <div class="flex items-center gap-4 text-xs font-mono" style="color:var(--accent);opacity:0.7">
        <span>Run: ${esc(RUN.run_id)}</span>
        <span class="status-badge status-${({success:'success', abort:'abort', interrupted:'interrupted', error:'abort', loop:'loop'}[s.final_status] || 'running')}" style="font-size:11px;opacity:1">${esc(s.final_status || 'running')}</span>
      </div>
    </div>
    <div id="exec-log-content" class="p-6 font-mono text-sm overflow-y-auto space-y-2" style="color:var(--text-muted); max-height:400px">
      ${buildExecutionLog()}
    </div>
  </div>`;

  // Cost Budget
  const inputTokens = m.input_tokens != null ? m.input_tokens : null;
  const cacheCreation = m.cache_creation_input_tokens != null ? m.cache_creation_input_tokens : null;
  const cacheRead = m.cache_read_input_tokens != null ? m.cache_read_input_tokens : null;
  const outputTokens = m.output_tokens != null ? m.output_tokens : null;
  const currentCost = [_tokenPrice('input',inputTokens),_tokenPrice('cache_creation',cacheCreation),_tokenPrice('cache_read',cacheRead),_tokenPrice('output',outputTokens)].filter(v=>v!=null).reduce((a,b)=>a+b,0);
  const costLimit = m.cost_limit;
  const costPct = costLimit != null && costLimit > 0 ? Math.min((currentCost / costLimit) * 100, 100) : null;
  const costExceeded = costLimit != null && currentCost >= costLimit;
  const barColor = costExceeded ? 'var(--status-error-text)' : costPct != null && costPct > 80 ? '#FFA726' : 'var(--accent)';
  const barShadow = costExceeded ? '0 0 12px rgba(239,83,80,0.4)' : costPct != null && costPct > 80 ? '0 0 8px rgba(255,167,38,0.3)' : '0 0 8px rgba(100,181,246,0.3)';

  html += `<div class="lg:col-span-4">
    <div class="p-6 rounded-xl border h-full flex flex-col" style="background:var(--card-bg-alt); border-color:var(--border-subtle)">
      <h3 class="font-headline text-lg font-bold mb-6 pl-4" style="color:var(--text-heading); border-left:4px solid var(--accent)">Cost Budget</h3>
      <div class="flex-1 flex flex-col justify-center space-y-4">
        <div class="space-y-3">
          <div class="flex justify-between items-end">
            <span class="text-xs uppercase tracking-widest font-headline" style="color:var(--accent-secondary)">Current Cost</span>
            <span class="text-2xl font-bold font-mono" style="color:${costExceeded ? 'var(--status-error-text)' : 'var(--text-heading)'}">$${currentCost.toFixed(2)}</span>
          </div>
          ${costLimit != null ? `<div class="h-4 rounded-full overflow-hidden" style="background:var(--main-bg)">
            <div class="h-full rounded-full" style="background:${barColor}; width:${costPct}%; box-shadow:${barShadow}; transition:width 0.5s ease, background 0.3s ease"></div>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-xs font-mono" style="color:var(--text-muted)">${costPct.toFixed(1)}% used</span>
            <span class="text-xs font-mono" style="color:var(--text-muted)">Limit: $${costLimit.toFixed(2)}</span>
          </div>` : `<div class="h-4 rounded-full overflow-hidden" style="background:var(--main-bg)">
            <div class="h-full rounded-full" style="background:var(--accent); width:100%; box-shadow:0 0 8px rgba(100,181,246,0.3)"></div>
          </div>
          <div class="text-xs font-mono" style="color:var(--text-muted)">No cost limit set</div>`}
        </div>
        <div class="grid grid-cols-2 gap-x-4 gap-y-2 pt-2">
          <div class="flex justify-between"><span class="text-xs" style="color:var(--text-muted)">Input</span><span class="text-xs font-mono font-bold" style="color:var(--text-heading)">${inputTokens != null ? inputTokens.toLocaleString() : 'N/A'}</span></div>
          <div class="flex justify-between"><span class="text-xs" style="color:var(--text-muted)">Cache Create</span><span class="text-xs font-mono font-bold" style="color:var(--text-heading)">${cacheCreation != null ? cacheCreation.toLocaleString() : 'N/A'}</span></div>
          <div class="flex justify-between"><span class="text-xs" style="color:var(--text-muted)">Cache Read</span><span class="text-xs font-mono font-bold" style="color:var(--text-heading)">${cacheRead != null ? cacheRead.toLocaleString() : 'N/A'}</span></div>
          <div class="flex justify-between"><span class="text-xs" style="color:var(--text-muted)">Output</span><span class="text-xs font-mono font-bold" style="color:var(--text-heading)">${outputTokens != null ? outputTokens.toLocaleString() : 'N/A'}</span></div>
        </div>
      </div>

        <button id="evoPrev" onclick="evoStep(-1)" disabled>&larr; Prev</button>
        <span class="evo-step-label" id="evoLabel">Round 1</span>
        <button id="evoNext" onclick="evoStep(1)">Next &rarr;</button>
      </div>
      <div style="width:300px;flex-shrink:0"></div>
    </div>
    <div class="evo-card" id="evoCard"></div>
  </div>`;

  // Approach Cards (latest loop that has approaches)
  const latestLoopWithApproaches = [...RUN.loops].reverse().find(l => l.approaches && l.approaches.length > 0);
  const latestLoop = latestLoopWithApproaches || (RUN.loops.length ? RUN.loops[RUN.loops.length - 1] : null);
  if (latestLoop && latestLoop.approaches.length) {
    html += `<div class="space-y-4">

    }
    html += '</div></div>';
  }

  return html;
}

function buildExecutionLog() {
  let html = '';

  // Use real timeline data if available
  if (TIMELINE.length > 0) {
    for (const entry of TIMELINE) {
      const time = formatISOTime(entry.timestamp);
      const ev = entry.event;

      if (ev === 'pipeline_start') {
        html += logLine(time, 'INFO', 'Agent core initialized. Run ID: ' + esc(entry.run_id || RUN.run_id));
      } else if (ev === 'stage_complete' || ev === 'stage_progress') {
        const stageLabels = {prepare: 'Prepare', propose: 'Propose', implement: 'Implement'};
        const stageLabel = stageLabels[entry.stage] || entry.stage;
        const level = 'EXEC';
        const statusLabel = entry.status === 'running' ? 'in progress' : esc(entry.status || 'done');
        html += logLine(time, level, `Round ${entry.loop_index} — ${stageLabel} stage: ${statusLabel}`);
        if (entry.summary) {
          html += logLine(time, 'INFO', truncate(entry.summary, 120));
        }
      } else if (ev === 'approach_scored') {
        const scoreStr = entry.score != null ? ` (score: ${fmtScore(entry.score)})` : '';
        const displayName = entry.name || entry.approach_id;
        html += logLine(time, 'SYNC', `Approach ${esc(displayName)}${scoreStr} — ${esc(entry.approach_status || 'unknown')}`);
      } else if (ev === 'pipeline_end') {
        html += logLine(time, 'INFO', `Pipeline finished: ${esc(entry.final_status)}`);
      }
    }

    // If pipeline is still running, infer current activity from last event
    const isRunning = !['success','abort','interrupted','error','loop'].includes(RUN.summary.final_status || 'running');
    if (isRunning) {
      const lastEntry = TIMELINE[TIMELINE.length - 1];
      const activity = _inferCurrentActivity(lastEntry);
      html += `<div class="flex gap-4 animate-pulse">
        <span class="whitespace-nowrap" style="color:var(--log-time)">${formatISOTime(new Date().toISOString())}</span>
        <span class="font-bold" style="color:var(--log-info)">[INFO]</span>
        <span style="color:var(--text-heading)">${esc(activity)}</span>
      </div>`;
    }
    return html;
  }

  // Fallback: estimate timestamps from loop data when timeline is empty
  const now = new Date();
  const baseTime = new Date(now.getTime() - (RUN.loops.length * 120000));

  html += logLine(formatTime(baseTime), 'INFO', 'Agent core initialized. Run ID: ' + esc(RUN.run_id));

  // Prepare stage (loop 0)
  const prepareLoop = RUN.loops.find(l => l.prepare_result != null);
  if (prepareLoop) {
    html += logLine(formatTime(new Date(baseTime.getTime() + 10000)), 'EXEC', `Prepare stage: ${esc(prepareLoop.prepare_result.status || 'done')}`);
  }

  for (const loop of RUN.loops) {
    const t1 = new Date(baseTime.getTime() + loop.loop_index * 60000);
    const t2 = new Date(t1.getTime() + 30000);

    if (loop.propose_result) {
      html += logLine(formatTime(t1), 'EXEC', `Round ${loop.loop_index} — Propose stage: ${esc(loop.propose_result.status || 'done')}`);
      if (loop.propose_result.summary) {
        html += logLine(formatTime(new Date(t1.getTime() + 5000)), 'INFO', truncate(loop.propose_result.summary, 120));
      }
    }
    if (loop.implement_result) {
      const implStatusLabel = loop.implement_result.status === 'running' ? 'in progress' : esc(loop.implement_result.status || 'done');
      html += logLine(formatTime(t2), 'EXEC', `Round ${loop.loop_index} — Implement stage: ${implStatusLabel}`);
    }
    for (const a of loop.approaches) {
      const ta = new Date(t2.getTime() + 10000);
      const scoreStr = a.score != null ? ` (score: ${fmtScore(a.score)})` : '';
      html += logLine(formatTime(ta), 'SYNC', `Approach ${esc(a.name || a.approach_id)}${scoreStr} — ${esc(a.status || 'unknown')}`);
    }
  }

  const isRunning = !['success','abort','interrupted','error','loop'].includes(RUN.summary.final_status || 'running');
  if (isRunning) {
    // Infer current activity from loop data in fallback mode
    const lastLoop = RUN.loops.length > 0 ? RUN.loops[RUN.loops.length - 1] : null;
    let activity = 'Pipeline starting...';
    if (!lastLoop) {
      // Check if prepare is running
      const curStage2 = RUN.metadata._current_stage || '';
      activity = curStage2 === 'prepare' ? 'Prepare stage in progress...' : 'Propose stage in progress (Round 1)...';
    } else if (lastLoop.prepare_result && lastLoop.prepare_result.status === 'abort') {
      activity = 'Prepare stage failed, pipeline stopping...';
    } else if (lastLoop.propose_result && lastLoop.propose_result.status === 'abort') {
      activity = `Propose stage failed (Round ${lastLoop.loop_index}), pipeline stopping...`;
    } else if (!lastLoop.implement_result || lastLoop.implement_result.status === 'running') {
      activity = `Implement stage in progress (Round ${lastLoop.loop_index})...`;
    } else {
      activity = `Propose stage in progress (Round ${lastLoop.loop_index + 1})...`;
    }
    html += `<div class="flex gap-4 animate-pulse">
      <span class="whitespace-nowrap" style="color:var(--log-time)">${formatISOTime(now.toISOString())}</span>
      <span class="font-bold" style="color:var(--log-info)">[INFO]</span>
      <span style="color:var(--text-heading)">${esc(activity)}</span>
    </div>`;
  } else {
    html += logLine(formatISOTime(now.toISOString()), 'INFO', `Pipeline finished: ${esc(RUN.summary.final_status)}`);
  }

  return html;
}

function _inferCurrentActivity(lastEntry) {
  if (!lastEntry) return 'Pipeline starting...';
  const ev = lastEntry.event;
  if (ev === 'pipeline_start') return 'Prepare stage in progress...';
  if (ev === 'stage_complete' && lastEntry.stage === 'prepare' && lastEntry.status === 'abort') {
    return 'Prepare stage failed, pipeline stopping...';
  }
  if (ev === 'stage_complete' && lastEntry.stage === 'prepare') {
    return 'Propose stage in progress (Round 1)...';
  }
  if (ev === 'stage_complete' && lastEntry.stage === 'propose' && lastEntry.status === 'abort') {
    return `Propose stage failed (Round ${lastEntry.loop_index}), pipeline stopping...`;
  }
  if (ev === 'stage_complete' && lastEntry.stage === 'propose') {
    return `Implement stage in progress (Round ${lastEntry.loop_index})...`;
  }
  if ((ev === 'stage_complete' || ev === 'stage_progress') && lastEntry.stage === 'implement') {
    if (lastEntry.status === 'running') {
      return `Implement stage in progress (Round ${lastEntry.loop_index})...`;
    }
    return `Propose stage in progress (Round ${lastEntry.loop_index + 1})...`;
  }
  if (ev === 'approach_scored') {
    // Approach scored but implement might still be running
    const curStage = RUN.metadata._current_stage || '';
    const curLoop = RUN.metadata._current_loop_index || 0;
    if (curStage === 'implement' && lastEntry.loop_index === curLoop) {
      return `Implement stage in progress (Round ${lastEntry.loop_index})...`;
    }
    return `Propose stage in progress (Round ${lastEntry.loop_index + 1})...`;
  }
  return 'Processing...';
}

function logLine(time, level, msg) {
  const levelColor = level === 'INFO' ? 'var(--log-info)' : level === 'EXEC' ? 'var(--log-exec)' : level === 'SYNC' ? 'var(--log-sync)' : 'var(--text-muted)';
  return `<div class="flex gap-4">
    <span class="whitespace-nowrap" style="color:var(--log-time)">${time}</span>
    <span class="font-bold" style="color:${levelColor}">[${level}]</span>
    <span>${esc(msg)}</span>
  </div>`;
}

function formatTime(d) {
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
}

function formatISOTime(iso) {
  if (!iso) return '--';
  try {
    const d = new Date(iso);
    const yy = String(d.getFullYear());
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yy}-${mm}-${dd} ${formatTime(d)}`;
  } catch { return '--'; }
}

function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }
